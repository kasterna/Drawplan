  // ---------- Eksporter som PNG ----------
  function getResolvedThemeVars(){
    const cs = getComputedStyle(document.body);
    const names = ["--bg","--bg-vignette","--surface","--surface-border","--line","--line-strong",
      "--wall-drafting","--wall-polish-a","--wall-polish-b","--floor-polish-a","--floor-polish-b",
      "--accent","--accent-soft","--sun","--danger","--danger-soft","--text","--text-dim","--text-faint",
      "--overlay-1","--overlay-2","--overlay-3","--mono","--sans"];
    let css = ":root{";
    names.forEach(n => { css += n + ":" + cs.getPropertyValue(n).trim() + ";"; });
    css += "}";
    return css;
  }

  function exportPNG(){
    const bounds = computeContentBoundsPx();
    const widthPx = bounds.maxX - bounds.minX;
    const heightPx = bounds.maxY - bounds.minY;

    const clone = stage.cloneNode(true);
    clone.setAttribute("viewBox", `${bounds.minX} ${bounds.minY} ${widthPx} ${heightPx}`);
    clone.setAttribute("width", widthPx);
    clone.setAttribute("height", heightPx);
    const cloneWorld = clone.querySelector("#world");
    if(cloneWorld) cloneWorld.style.transform = "none";

    // Bak inn beregnede farger direkte i hvert element i klonen.
    // CSS-variabler (var(--...)) løses IKKE opp av <img>-elementet som brukes til rasterisering —
    // det har ikke tilgang til dokumentets CSS-context. Vi må derfor hente de beregnede verdiene
    // fra det levende DOM-et og skrive dem som inline attributter på klonen.
    const liveEls = Array.from(stage.querySelectorAll("*"));
    const cloneEls = Array.from(clone.querySelectorAll("*"));
    const props = ["fill","stroke","stroke-width","stroke-opacity","fill-opacity","opacity",
      "stroke-dasharray","font-family","font-size","font-weight","text-anchor","dominant-baseline"];
    liveEls.forEach((live, i) => {
      const ce = cloneEls[i];
      if(!ce) return;
      const cs = getComputedStyle(live);
      props.forEach(p => {
        const v = cs.getPropertyValue(p);
        if(v && v !== "none" && v !== "") ce.setAttribute(p, v);
      });
    });

    // Bakgrunnsfarge løses opp og skrives inn som et solid rektangel i topp av klonen.
    const bgColor = getComputedStyle(document.body).getPropertyValue("--bg").trim();
    const bgRect = document.createElementNS(svgns, "rect");
    bgRect.setAttribute("x", bounds.minX); bgRect.setAttribute("y", bounds.minY);
    bgRect.setAttribute("width", widthPx); bgRect.setAttribute("height", heightPx);
    bgRect.setAttribute("fill", bgColor);
    const cloneWorldRef = clone.querySelector("#world");
    clone.insertBefore(bgRect, cloneWorldRef);

    const svgData = new XMLSerializer().serializeToString(clone);
    const svgBlob = new Blob([svgData], { type:"image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = ()=>{
      const scale = 2;
      const canvas = document.createElement("canvas");
      canvas.width = widthPx*scale; canvas.height = heightPx*scale;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0, widthPx, heightPx);
      URL.revokeObjectURL(url);
      canvas.toBlob((blob)=>{
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "drawplan.png";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
    };
    img.onerror = (e)=>{
      URL.revokeObjectURL(url);
      showSpaceHint(vb.w/2, vb.h/2, "EXPORT FAILED");
      console.error("PNG eksport feil:", e);
    };
    img.src = url;
  }
  document.getElementById("btnExport").addEventListener("click", exportPNG);

  // ---------- Eksporter som vektor-PDF (1:1 skala) ----------
  function computeContentBoundsPx(){
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity, any=false;
    interiorWalls.forEach(w => {
      const pad = (w.t*M/2) + 5;
      [[w.x1,w.y1],[w.x2,w.y2]].forEach(([mx,my]) => {
        const p = roomMetersToWorldPx(mx,my);
        if(p.x-pad<minX) minX=p.x-pad; if(p.x+pad>maxX) maxX=p.x+pad;
        if(p.y-pad<minY) minY=p.y-pad; if(p.y+pad>maxY) maxY=p.y+pad;
        any = true;
      });
    });
    if(!any){ return { minX:0, minY:0, maxX:vb.w, maxY:vb.h }; }
    const marginPx = 0.6*M; // luft til romnavn, mål og skjøter
    return { minX:minX-marginPx, minY:minY-marginPx, maxX:maxX+marginPx, maxY:maxY+marginPx };
  }

  function exportPDF(){
    if(!window.jspdf || !window.jspdf.jsPDF){
      showSpaceHint(vb.w/2, vb.h/2, "PDF LIBRARY NOT LOADED (REQUIRES INTERNET)");
      return;
    }
    const bounds = computeContentBoundsPx();
    const widthPx = bounds.maxX - bounds.minX;
    const heightPx = bounds.maxY - bounds.minY;
    const mmPerPx = 1000/M; // 1:1 skala — 1 verdens-px tilsvarer (1000/M) virkelige mm

    const clone = stage.cloneNode(true);
    clone.setAttribute("viewBox", `${bounds.minX} ${bounds.minY} ${widthPx} ${heightPx}`);
    clone.setAttribute("width", widthPx);
    clone.setAttribute("height", heightPx);
    const cloneWorld = clone.querySelector("#world");
    if(cloneWorld) cloneWorld.style.transform = "none";

    // Bak inn beregnede stiler direkte som attributter — garanterer riktige farger i PDF-en
    // uavhengig av om PDF-motoren tolker CSS-klasser/variabler.
    const liveEls = stage.querySelectorAll("*");
    const cloneEls = clone.querySelectorAll("*");
    const props = ["fill","stroke","stroke-width","stroke-opacity","fill-opacity","opacity",
      "stroke-dasharray","font-family","font-size","font-weight","text-anchor"];
    for(let i=0; i<liveEls.length; i++){
      const cs = getComputedStyle(liveEls[i]);
      const ce = cloneEls[i];
      if(!ce) continue;
      props.forEach(p => { const v = cs.getPropertyValue(p); if(v) ce.style.setProperty(p, v); });
    }
    const rootCs = getComputedStyle(stage);
    props.forEach(p => { const v = rootCs.getPropertyValue(p); if(v) clone.style.setProperty(p, v); });

    const pageStyle = document.querySelector("style").textContent;
    const styleEl = document.createElementNS(svgns, "style");
    styleEl.textContent = getResolvedThemeVars() + "\n" + pageStyle;
    clone.insertBefore(styleEl, clone.firstChild);

    clone.style.position = "fixed";
    clone.style.left = "-99999px";
    clone.style.top = "0";
    document.body.appendChild(clone);

    const widthMM = widthPx*mmPerPx, heightMM = heightPx*mmPerPx;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({
      orientation: widthMM > heightMM ? "landscape" : "portrait",
      unit: "mm",
      format: [widthMM, heightMM]
    });

    doc.svg(clone, { x:0, y:0, width:widthMM, height:heightMM }).then(()=>{
      document.body.removeChild(clone);
      doc.save("drawplan_1-1_skala.pdf");
    }).catch((err)=>{
      document.body.removeChild(clone);
      console.error(err);
      showSpaceHint(vb.w/2, vb.h/2, "PDF EXPORT FAILED");
    });
  }
  document.getElementById("btnExportPDF").addEventListener("click", exportPDF);

  // ---------- Eksporter som SVG (ekte skala, snappbar i Blender/CAD) ----------
  // Blenders innebygde SVG-importer (File > Import > Scalable Vector Graphics) leser kun
  // ekte geometri (path/polygon/line/circle) inn som Curve-objekter med reelle vertekser —
  // <text> hoppes stille over. Dermed kan alt (vegger, åpninger, mål, rutenett, romnavn)
  // ligge i samme fil: geometrien blir snappbar i Blender, teksten vises bare i nettleser/CAD.
  // Filen skrives i mm (width/height med "mm"-enhet), som gjør at Blender importerer i riktig
  // fysisk målestokk automatisk (1000 mm i SVG = 1 m i Blender) — verifisert testimport.

  function escapeXml(s){
    return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&apos;" }[c]));
  }

  function computeContentBoundsMeters(){
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity, any=false;
    const grow = (x,y) => {
      if(x<minX) minX=x; if(x>maxX) maxX=x;
      if(y<minY) minY=y; if(y>maxY) maxY=y;
      any = true;
    };
    interiorWalls.forEach(w => {
      const pad = w.t/2 + 0.05;
      grow(w.x1-pad, w.y1-pad); grow(w.x1+pad, w.y1+pad);
      grow(w.x2-pad, w.y2-pad); grow(w.x2+pad, w.y2+pad);
    });
    dimensions.forEach(d => {
      const dx=d.x2-d.x1, dy=d.y2-d.y1, len=Math.hypot(dx,dy)||0.0001;
      const nx=-dy/len, ny=dx/len, off=d.offset;
      grow(d.x1+nx*off, d.y1+ny*off); grow(d.x2+nx*off, d.y2+ny*off);
    });
    spaces.forEach(sp => {
      const m = worldPxToRoomMeters(sp.labelX, sp.labelY);
      grow(m.x, m.y);
    });
    if(!any){ minX=0; minY=0; maxX=5; maxY=5; }
    const margin = 0.8; // meter — plass til mål, romnavn og rutenett-bobler
    return { minX:minX-margin, minY:minY-margin, maxX:maxX+margin, maxY:maxY+margin };
  }

  // Deler en vegg i separate rektangel-polygoner, kuttet ved hver dør/vindusåpning
  // (ekte geometrisk hull, ikke bare visuell maskering slik skjermtegningen gjør det).
  // Endene får samme gjæringsforlengelse (t/2) som wallPolygonPoints — kun ved veggens
  // faktiske ytterpunkt, ikke ved et kutt mot en åpning.
  function wallOutlineSegmentsMeters(w){
    const dx=w.x2-w.x1, dy=w.y2-w.y1;
    const len=Math.hypot(dx,dy)||0.0001;
    const ux=dx/len, uy=dy/len, nx=-uy, ny=ux, half=w.t/2;
    const cuts = openings.filter(o => o.wallId===w.id).map(o => {
      const c0=Math.max(0,o.s-o.width/2), c1=Math.min(len,o.s+o.width/2);
      return [c0,c1];
    }).sort((a,b)=>a[0]-b[0]);
    const segs=[]; let cursor=0;
    cuts.forEach(([c0,c1]) => {
      if(c0>cursor+1e-6) segs.push([cursor,c0]);
      cursor=Math.max(cursor,c1);
    });
    if(cursor<len-1e-6) segs.push([cursor,len]);
    return segs.map(([s0,s1]) => {
      const extStart = s0<=1e-6 ? half:0, extEnd = s1>=len-1e-6 ? half:0;
      const ax=w.x1+ux*(s0-extStart), ay=w.y1+uy*(s0-extStart);
      const bx=w.x1+ux*(s1+extEnd),   by=w.y1+uy*(s1+extEnd);
      return [
        { x:ax+nx*half, y:ay+ny*half },
        { x:bx+nx*half, y:by+ny*half },
        { x:bx-nx*half, y:by-ny*half },
        { x:ax-nx*half, y:ay-ny*half },
      ];
    });
  }

  function exportSVG(){
    const b = computeContentBoundsMeters();
    const Wmm = (b.maxX-b.minX)*1000, Hmm = (b.maxY-b.minY)*1000;
    const mx = x => (x-b.minX)*1000;
    const my = y => (y-b.minY)*1000;
    const f = n => n.toFixed(1);
    const pt = (x,y) => `${f(mx(x))},${f(my(y))}`;
    const line = (x1,y1,x2,y2,cls) => `<line x1="${f(mx(x1))}" y1="${f(my(y1))}" x2="${f(mx(x2))}" y2="${f(my(y2))}" class="${cls}"/>\n`;

    let wallsSvg = "";
    interiorWalls.forEach(w => {
      wallOutlineSegmentsMeters(w).forEach((poly, i) => {
        wallsSvg += `<polygon id="wall-${escapeXml(w.id)}-${i}" points="${poly.map(p=>pt(p.x,p.y)).join(" ")}" class="wall"/>\n`;
      });
    });

    let openingsSvg = "";
    openings.forEach(op => {
      const w = interiorWalls.find(x => x.id===op.wallId);
      if(!w) return;
      const dx=w.x2-w.x1, dy=w.y2-w.y1, len=Math.hypot(dx,dy)||0.0001;
      const ux=dx/len, uy=dy/len, nx=-uy, ny=ux, half=w.t/2;
      const s = Math.min(Math.max(op.s, op.width/2), Math.max(len-op.width/2, op.width/2));
      const ax=w.x1+ux*(s-op.width/2), ay=w.y1+uy*(s-op.width/2);
      const bx=w.x1+ux*(s+op.width/2), by=w.y1+uy*(s+op.width/2);

      [[ax,ay],[bx,by]].forEach(([px,py]) => {
        openingsSvg += line(px+nx*half, py+ny*half, px-nx*half, py-ny*half, "op-jamb");
      });

      if(op.type === "door"){
        const atB = op.hingeEnd === "2";
        const hinge = atB ? {x:bx,y:by} : {x:ax,y:ay};
        const otherJamb = atB ? {x:ax,y:ay} : {x:bx,y:by};
        const sign = op.flip ? -1 : 1;
        const leafTip = { x: hinge.x + nx*sign*op.width, y: hinge.y + ny*sign*op.width };
        openingsSvg += `<line id="door-${escapeXml(op.id)}-leaf" x1="${f(mx(hinge.x))}" y1="${f(my(hinge.y))}" x2="${f(mx(leafTip.x))}" y2="${f(my(leafTip.y))}" class="op-leaf"/>\n`;
        const cross = (otherJamb.x-hinge.x)*(leafTip.y-hinge.y) - (otherJamb.y-hinge.y)*(leafTip.x-hinge.x);
        const sweep = cross > 0 ? 1 : 0;
        openingsSvg += `<path id="door-${escapeXml(op.id)}-arc" d="M ${pt(otherJamb.x,otherJamb.y)} A ${f(op.width*1000)},${f(op.width*1000)} 0 0,${sweep} ${pt(leafTip.x,leafTip.y)}" class="op-arc" fill="none"/>\n`;
      } else {
        [-1,1].forEach(side => {
          const off = half*0.35*side;
          openingsSvg += line(ax+nx*off, ay+ny*off, bx+nx*off, by+ny*off, "op-pane");
        });
      }
    });

    let roomsSvg = "";
    spaces.forEach(sp => {
      const m = worldPxToRoomMeters(sp.labelX, sp.labelY);
      const area = sp.areaM2 != null ? fmtArea(sp.areaM2) : "";
      roomsSvg += `<text x="${f(mx(m.x))}" y="${f(my(m.y))}" class="room-name" text-anchor="middle">${escapeXml(sp.name||"")}</text>\n`;
      roomsSvg += `<text x="${f(mx(m.x))}" y="${f(my(m.y)+180)}" class="room-area" text-anchor="middle">${escapeXml(area)}</text>\n`;
    });

    let dimsSvg = "";
    dimensions.forEach(d => {
      const dx=d.x2-d.x1, dy=d.y2-d.y1, len=Math.hypot(dx,dy)||0.0001;
      const ux=dx/len, uy=dy/len, nx=-uy, ny=ux;
      let off = d.offset;
      if(Math.abs(off) < 0.02) off = off<0 ? -0.02 : 0.02;
      const d1={x:d.x1+nx*off,y:d.y1+ny*off}, d2={x:d.x2+nx*off,y:d.y2+ny*off};
      const overshoot = Math.sign(off)*0.03;
      const e1={x:d.x1+nx*(off+overshoot),y:d.y1+ny*(off+overshoot)};
      const e2={x:d.x2+nx*(off+overshoot),y:d.y2+ny*(off+overshoot)};
      dimsSvg += line(d.x1,d.y1,e1.x,e1.y,"dim-ext");
      dimsSvg += line(d.x2,d.y2,e2.x,e2.y,"dim-ext");
      dimsSvg += line(d1.x,d1.y,d2.x,d2.y,"dim-line");
      const tick=0.03;
      [d1,d2].forEach(p => {
        dimsSvg += line(p.x-(ux-nx)*tick*0.5, p.y-(uy-ny)*tick*0.5, p.x+(ux-nx)*tick*0.5, p.y+(uy-ny)*tick*0.5, "dim-tick");
      });
      const mid={x:(d1.x+d2.x)/2+nx*0.07,y:(d1.y+d2.y)/2+ny*0.07};
      dimsSvg += `<text x="${f(mx(mid.x))}" y="${f(my(mid.y))}" class="dim-text" text-anchor="middle">${escapeXml(formatLength(len))}</text>\n`;
    });

    let gridSvg = "";
    archGridLines.forEach(g => {
      let x1,y1,x2,y2;
      if(g.axis === "y"){ x1=g.pos; y1=b.minY+0.3; x2=g.pos; y2=b.maxY-0.3; }
      else { x1=b.minX+0.3; y1=g.pos; x2=b.maxX-0.3; y2=g.pos; }
      gridSvg += line(x1,y1,x2,y2,"grid-line");
      const r=140;
      [[x1,y1],[x2,y2]].forEach(([gx,gy], i) => {
        gridSvg += `<circle id="grid-${escapeXml(g.id)}-${i}" cx="${f(mx(gx))}" cy="${f(my(gy))}" r="${r}" class="grid-bubble"/>\n`;
        gridSvg += `<text x="${f(mx(gx))}" y="${f(my(gy))}" class="grid-label" text-anchor="middle" dominant-baseline="central">${escapeXml(g.label)}</text>\n`;
      });
    });

    const style = `
      .wall{ fill:#d8d8d8; stroke:#000; stroke-width:2; }
      .op-jamb, .op-leaf, .op-arc, .op-pane{ stroke:#000; stroke-width:2; fill:none; }
      .room-name{ font:600 130px sans-serif; fill:#000; }
      .room-area{ font:400 100px sans-serif; fill:#555; }
      .dim-ext, .dim-line, .dim-tick{ stroke:#c0392b; stroke-width:1.5; }
      .dim-text{ font:400 90px monospace; fill:#c0392b; }
      .grid-line{ stroke:#2980b9; stroke-width:1.5; stroke-dasharray:120 40 20 40; }
      .grid-bubble{ stroke:#2980b9; stroke-width:2; fill:#fff; }
      .grid-label{ font:600 140px monospace; fill:#2980b9; }
    `;

    const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${f(Wmm)}mm" height="${f(Hmm)}mm" viewBox="0 0 ${f(Wmm)} ${f(Hmm)}">
<style>${style}</style>
<g id="walls">
${wallsSvg}</g>
<g id="openings">
${openingsSvg}</g>
<g id="rooms">
${roomsSvg}</g>
<g id="dimensions">
${dimsSvg}</g>
<g id="grid">
${gridSvg}</g>
</svg>
`;

    const blob = new Blob([svg], { type:"image/svg+xml" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const stamp = new Date().toISOString().slice(0,10);
    a.download = "drawplan_" + stamp + ".svg";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  document.getElementById("btnExportSVG").addEventListener("click", exportSVG);


  // ---------- Tegning ----------
  let drawState = null;   // { startM:{x,y} }
  let previewWall = null;
  let lastPointerClient = { x:0, y:0 };
  const VERTEX_SNAP_PX = 15;  // hjørne — større fangstradius, siden det er høyest prioritet
  const EDGE_SNAP_PX = 9;     // kant/overflate
  const drawLengthOverlay = document.getElementById("drawLengthOverlay");
  const drawLengthInput = document.getElementById("drawLengthInput");
  const drawLengthUnitLabel = document.getElementById("drawLengthUnitLabel");

  function snap5(v){ return snapEnabled ? Math.round(v/0.05)*0.05 : v; }

  // Magnetisk snap til nærmeste eksisterende veggendepunkt (hjørne), innenfor toleranse.
  function findNearbyVertex(px, py, tolerancePx, excludeWallId){
    if(!snapEnabled) return null;
    let best = null, bestDist = tolerancePx;
    interiorWalls.forEach(w => {
      if(w.id === excludeWallId) return;
      const p1 = roomMetersToWorldPx(w.x1, w.y1);
      const p2 = roomMetersToWorldPx(w.x2, w.y2);
      const dx = p2.x-p1.x, dy = p2.y-p1.y;
      const len = Math.hypot(dx,dy) || 0.0001;
      const ux = dx/len, uy = dy/len;
      const nx = -uy, ny = ux;
      const half = w.t*M/2;
      // Veggen TEGNES med endene forlenget en halv tykkelse langs lengderetningen
      // (se wallPolygonPoints) — hjørne-kandidatene må matche det, ikke senterlinjens rå endepunkt.
      const a = { x: p1.x - ux*half, y: p1.y - uy*half };
      const b = { x: p2.x + ux*half, y: p2.y + uy*half };
      const candidates = [
        p1, p2,                                                    // senterlinjens endepunkter
        { x:a.x+nx*half, y:a.y+ny*half }, { x:a.x-nx*half, y:a.y-ny*half },  // faktiske hjørner ved p1 (ytter/inner)
        { x:b.x+nx*half, y:b.y+ny*half }, { x:b.x-nx*half, y:b.y-ny*half },  // faktiske hjørner ved p2 (ytter/inner)
      ];
      candidates.forEach(p => {
        const d = Math.hypot(p.x-px, p.y-py);
        if(d < bestDist){ bestDist = d; best = { x:p.x, y:p.y }; }
      });
    });
    return best;
  }

  // Snap til nærmeste punkt langs en veggs ytterkant, senterlinje eller innerkant, utenom selve hjørnene.
  function findEdgeSnap(px, py, tolerancePx, excludeWallId){
    if(!snapEnabled) return null;
    let best = null, bestDist = tolerancePx;
    interiorWalls.forEach(w => {
      if(w.id === excludeWallId) return;
      const p1 = roomMetersToWorldPx(w.x1, w.y1);
      const p2 = roomMetersToWorldPx(w.x2, w.y2);
      const dx = p2.x-p1.x, dy = p2.y-p1.y;
      const len = Math.hypot(dx,dy) || 0.0001;
      const ux = dx/len, uy = dy/len;
      const nx = -uy, ny = ux;
      const half = w.t*M/2;
      [0, half, -half].forEach(offset => {  // senter, ytterkant, innerkant
        const ox1 = p1.x + nx*offset, oy1 = p1.y + ny*offset;
        const vx = px-ox1, vy = py-oy1;
        let s = vx*ux + vy*uy;
        if(s < 6 || s > len-6) return; // for nærme et hjørne — dekkes allerede av vertex-snap
        const projX = ox1 + ux*s, projY = oy1 + uy*s;
        const d = Math.hypot(px-projX, py-projY);
        if(d < bestDist){ bestDist = d; best = { x:projX, y:projY }; }
      });
    });
    return best;
  }

  // Finner hvilken type snap (Solibri-stil) som gjelder på et gitt punkt, til visning av markør.
  function resolveSnapMarker(px, py){
    if(!snapEnabled) return null;
    const vertex = findNearbyVertex(px, py, VERTEX_SNAP_PX);
    if(vertex) return { x:vertex.x, y:vertex.y, type:"vertex" };
    const faceLine = findAnchorWallAt(px, py);
    if(faceLine) return { x:px, y:py, type:"face" };
    const edge = findEdgeSnap(px, py, EDGE_SNAP_PX);
    if(edge) return { x:edge.x, y:edge.y, type:"edge" };
    return null;
  }

  function renderSnapMarker(pt){
    while(snapMarkerLayer.firstChild) snapMarkerLayer.removeChild(snapMarkerLayer.firstChild);
    if(!pt) return;
    const s = 20/view.k; // skjermkonstant størrelse — krymper ikke ved utzooming (stroke er alt konstant via vector-effect)
    let shape;
    if(pt.type === "vertex"){
      shape = el("rect", { x:pt.x-s/2, y:pt.y-s/2, width:s, height:s, class:"snap-marker snap-marker-vertex" });
    } else if(pt.type === "edge"){
      const h = s*1.15;
      const pts = `${pt.x},${pt.y-h*0.6} ${pt.x-h*0.6},${pt.y+h*0.45} ${pt.x+h*0.6},${pt.y+h*0.45}`;
      shape = el("polygon", { points:pts, class:"snap-marker snap-marker-edge" });
    } else {
      shape = el("circle", { cx:pt.x, cy:pt.y, r:s*0.6, class:"snap-marker snap-marker-face" });
    }
    snapMarkerLayer.appendChild(shape);
  }

  const btnSnap = document.getElementById("btnSnap");
  btnSnap.addEventListener("click", ()=>{
    snapEnabled = !snapEnabled;
    btnSnap.classList.toggle("active", snapEnabled);
  });

  // ---------- Rutenett (Blender-stil, adaptivt) ----------
  const btnGrid = document.getElementById("btnGrid");
  btnGrid.addEventListener("click", ()=>{
    gridEnabled = !gridEnabled;
    btnGrid.classList.toggle("active", gridEnabled);
    renderGrid();
  });

  // ---------- Måleenhet (mm / cm / m / imperial) ----------
  let displayUnit = "mm";
  const M_PER_FOOT = 0.3048;
  const M_PER_INCH = 0.0254;

  function metersToImperialParts(meters){
    const totalInches = meters / M_PER_INCH;
    let feet = Math.floor(totalInches/12 + 1e-9);
    let inches = totalInches - feet*12;
    let eighths = Math.round(inches*8);
    if(eighths >= 96){ feet += 1; eighths -= 96; }
    const wholeInches = Math.floor(eighths/8);
    const remEighths = eighths % 8;
    return { feet, wholeInches, remEighths };
  }
  function fracString(remEighths){
    if(remEighths === 0) return "";
    const g = (a,b) => b ? g(b, a%b) : a;
    const div = g(remEighths, 8);
    return " " + (remEighths/div) + "/" + (8/div);
  }

  function formatLength(meters){
    const sign = meters < -0.001 ? "-" : "";
    const val = Math.abs(meters);
    if(displayUnit === "mm") return sign + Math.round(val*1000) + " MM";
    if(displayUnit === "cm") return sign + (val*100).toFixed(1).replace(".", ",") + " CM";
    if(displayUnit === "imperial"){
      const p = metersToImperialParts(val);
      return sign + p.feet + "'-" + p.wholeInches + fracString(p.remEighths) + '"';
    }
    return sign + val.toFixed(2).replace(".", ",") + " M";
  }

  function parseLength(str){
    if(!str) return NaN;
    const s = str.trim();
    if(displayUnit === "imperial"){
      if(s.includes("'")){
        const parts = s.split("'");
        const feet = parseFloat(parts[0].replace(",", ".")) || 0;
        const inchesPart = (parts[1]||"").replace('"', "").replace("-", " ").trim();
        const inches = parseFloat(inchesPart.replace(",", ".")) || 0;
        return feet*M_PER_FOOT + inches*M_PER_INCH;
      }
      const ft = parseFloat(s.replace(",", "."));
      return Number.isNaN(ft) ? NaN : ft*M_PER_FOOT;
    }
    const num = parseFloat(s.replace(",", "."));
    if(Number.isNaN(num)) return NaN;
    if(displayUnit === "mm") return num/1000;
    if(displayUnit === "cm") return num/100;
    return num;
  }

  const unitSelect = document.getElementById("unitSelect");
  unitSelect.addEventListener("change", ()=>{
    displayUnit = unitSelect.value;
    renderDimensions();
    renderSpaces();
    if(activeTool === "edit" && selectedWallId) syncLengthInput();
    if(activeTool === "draw" && drawState) updatePreview(lastPointerClient.x, lastPointerClient.y, false);
  });

  function computeEndpoint(clientX, clientY, altFree){
    const w = toWorldPoint(clientX, clientY);
    const freeAngle = altFree || !snapEnabled;

    if(snapEnabled && !drawState.anchorResolved){
      const rdx = w.x - drawState.rawStartPx.x;
      const rdy = w.y - drawState.rawStartPx.y;
      if(Math.hypot(rdx, rdy) > 2){
        let dirx, diry;
        if(!freeAngle){
          if(Math.abs(rdx) >= Math.abs(rdy)){ dirx = rdx >= 0 ? 1 : -1; diry = 0; }
          else { dirx = 0; diry = rdy >= 0 ? 1 : -1; }
        } else {
          const rlen = Math.hypot(rdx, rdy) || 1;
          dirx = rdx/rlen; diry = rdy/rlen;
        }
        const anchor = findAnchorWallAt(drawState.rawStartPx.x, drawState.rawStartPx.y);
        if(anchor){
          const exit = rayExitPoint(anchor, drawState.rawStartPx.x, drawState.rawStartPx.y, dirx, diry);
          if(exit){
            const em = worldPxToRoomMeters(exit.x, exit.y);
            drawState.startM = { x: snap5(em.x), y: snap5(em.y) };
          }
        }
        drawState.anchorResolved = true;
      }
    } else if(!drawState.anchorResolved){
      drawState.anchorResolved = true;
    }

    const m = worldPxToRoomMeters(w.x, w.y);
    let dx = m.x - drawState.startM.x;
    let dy = m.y - drawState.startM.y;
    if(!freeAngle){
      if(Math.abs(dx) >= Math.abs(dy)) dy = 0; else dx = 0;
    }
    let ex = drawState.startM.x + dx;
    let ey = drawState.startM.y + dy;
    ex = snap5(ex); ey = snap5(ey);

    const candidatePx = roomMetersToWorldPx(ex, ey);
    const vertex = findNearbyVertex(candidatePx.x, candidatePx.y, VERTEX_SNAP_PX);
    if(vertex){
      const vm = worldPxToRoomMeters(vertex.x, vertex.y);
      ex = vm.x; ey = vm.y;
    } else {
      const edge = findEdgeSnap(candidatePx.x, candidatePx.y, EDGE_SNAP_PX);
      if(edge){
        const emv = worldPxToRoomMeters(edge.x, edge.y);
        ex = emv.x; ey = emv.y;
      }
    }
    return { x: ex, y: ey };
  }

  function startDrawing(e){
    const w = toWorldPoint(e.clientX, e.clientY);
    const vertex = findNearbyVertex(w.x, w.y, VERTEX_SNAP_PX);
    const edge = !vertex ? findEdgeSnap(w.x, w.y, EDGE_SNAP_PX) : null;
    const special = vertex || edge;
    const m = worldPxToRoomMeters(special ? special.x : w.x, special ? special.y : w.y);
    drawState = {
      startM: { x: special ? m.x : snap5(m.x), y: special ? m.y : snap5(m.y) },
      rawStartPx: special ? special : w,
      anchorResolved: false
    };
    if(!chainMode) stage.setPointerCapture(e.pointerId);
    drawLengthUserEdited = false;
    updatePreview(e.clientX, e.clientY, e.altKey);
    requestAnimationFrame(()=> drawLengthInput.focus());
  }

  let lastComputedEnd = null;
  let drawLengthUserEdited = false;
  let suppressLengthInputEvent = false;

  function setDrawLengthValue(text){
    suppressLengthInputEvent = true;
    drawLengthInput.value = text;
  }

  // ---------- Tracking lines ----------
  const TRACK_SNAP_PX = 6; // skjerm-px — innenfor dette snapper enden til tracking-linja

  function getAllVerticesPx(){
    const pts = [];
    interiorWalls.forEach(w => {
      if(w.id === "__preview__") return;
      const p1 = roomMetersToWorldPx(w.x1, w.y1);
      const p2 = roomMetersToWorldPx(w.x2, w.y2);
      const dx = p2.x-p1.x, dy = p2.y-p1.y;
      const len = Math.hypot(dx,dy)||0.0001;
      const ux = dx/len, uy = dy/len;
      const half = w.t*M/2;
      // Senterlinje-endepunkter og faktiske ytterhjørner
      [p1, p2,
       {x:p1.x-ux*half+(-uy)*half, y:p1.y-uy*half+ux*half},
       {x:p1.x-ux*half-(-uy)*half, y:p1.y-uy*half-ux*half},
       {x:p2.x+ux*half+(-uy)*half, y:p2.y+uy*half+ux*half},
       {x:p2.x+ux*half-(-uy)*half, y:p2.y+uy*half-ux*half},
      ].forEach(p => pts.push(p));
    });
    return pts;
  }

  function renderTrackingLines(startM, endM){
    while(trackingLayer.firstChild) trackingLayer.removeChild(trackingLayer.firstChild);
    if(!snapEnabled) return;

    const startPx = roomMetersToWorldPx(startM.x, startM.y);
    const endPx   = roomMetersToWorldPx(endM.x, endM.y);
    const verts   = getAllVerticesPx();
    const extent  = 1200 / view.k; // strekker seg langt ut
    const tol     = TRACK_SNAP_PX / view.k;

    verts.forEach(v => {
      // Horisontal tracking line fra vertex v
      const dyEnd  = Math.abs(endPx.y - v.y);
      if(dyEnd < tol){
        // Tegn horisontal linje gjennom v.y, fra v.x til litt forbi endPx.x
        const x0 = Math.min(v.x, endPx.x) - 20/view.k;
        const x1 = Math.max(v.x, endPx.x) + 20/view.k;
        trackingLayer.appendChild(el("line", { x1:x0, y1:v.y, x2:x1, y2:v.y, class:"tracking-line" }));
        trackingLayer.appendChild(el("circle", { cx:v.x, cy:v.y, r:3/view.k, class:"tracking-dot" }));
      }
      // Vertikal tracking line fra vertex v
      const dxEnd  = Math.abs(endPx.x - v.x);
      if(dxEnd < tol){
        const y0 = Math.min(v.y, endPx.y) - 20/view.k;
        const y1 = Math.max(v.y, endPx.y) + 20/view.k;
        trackingLayer.appendChild(el("line", { x1:v.x, y1:y0, x2:v.x, y2:y1, class:"tracking-line" }));
        trackingLayer.appendChild(el("circle", { cx:v.x, cy:v.y, r:3/view.k, class:"tracking-dot" }));
      }
    });
  }

  function clearTrackingLines(){
    while(trackingLayer.firstChild) trackingLayer.removeChild(trackingLayer.firstChild);
  }

  function updatePreview(clientX, clientY, altFree){
    if(!drawState) return;
    lastPointerClient = { x: clientX, y: clientY };
    const end = computeEndpoint(clientX, clientY, altFree);
    lastComputedEnd = end;
    const lenM = Math.hypot(end.x - drawState.startM.x, end.y - drawState.startM.y);
    previewWall = {
      id: "__preview__",
      x1: drawState.startM.x, y1: drawState.startM.y,
      x2: end.x, y2: end.y,
      t: thicknessMM/1000
    };
    renderInteriorWalls();
    renderTrackingLines(drawState.startM, end);

    const mid = roomMetersToWorldPx((drawState.startM.x+end.x)/2, (drawState.startM.y+end.y)/2);
    const client = worldToClient(mid.x, mid.y - 16);
    drawLengthOverlay.style.left = client.x + "px";
    drawLengthOverlay.style.top = client.y + "px";
    drawLengthOverlay.style.display = "flex";
    drawLengthUnitLabel.textContent = unitLabel();
    if(!drawLengthUserEdited && lenM > 0.02){
      setDrawLengthValue(formatLengthValueOnly(lenM));
    }
  }

  drawLengthInput.addEventListener("input", ()=>{
    if(suppressLengthInputEvent){ suppressLengthInputEvent = false; return; }
    drawLengthUserEdited = true;
  });

  function commitTypedLength(){
    if(!drawState) return;
    const lenM = parseLength(drawLengthInput.value);
    if(!lenM || lenM <= 0 || Number.isNaN(lenM)) return;

    const ref = (lastComputedEnd && Math.hypot(lastComputedEnd.x-drawState.startM.x, lastComputedEnd.y-drawState.startM.y) > 0.02)
      ? lastComputedEnd : { x: drawState.startM.x + 1, y: drawState.startM.y };
    const dx = ref.x - drawState.startM.x, dy = ref.y - drawState.startM.y;
    const dist = Math.hypot(dx,dy) || 1;
    const ux = dx/dist, uy = dy/dist;
    const end = { x: drawState.startM.x + ux*lenM, y: drawState.startM.y + uy*lenM };

    if(chainMode){
      const committed = commitSegment(drawState.startM, end);
      if(!committed){ cancelDraw(); return; }
      drawState = { startM: end, rawStartPx: roomMetersToWorldPx(end.x, end.y), anchorResolved:true };
      drawLengthUserEdited = false;
      setDrawLengthValue("");
      updatePreview(lastPointerClient.x, lastPointerClient.y, false);
      requestAnimationFrame(()=> drawLengthInput.focus());
    } else {
      commitSegment(drawState.startM, end);
      cancelDraw();
    }
  }

  drawLengthInput.addEventListener("keydown", (e)=>{
    if(e.key === "Enter"){ e.preventDefault(); commitTypedLength(); }
    if(e.key === "Escape"){ e.preventDefault(); cancelDraw(); setTool("pan"); }
  });

  // Fullfører ett vegg-segment fra startM til end. Returnerer true hvis en vegg faktisk ble lagt til.
  function commitSegment(startM, end){
    const lenM = Math.hypot(end.x - startM.x, end.y - startM.y);
    if(lenM < 0.15) return false;
    pushUndo();
    interiorWalls.push({
      id: "iw-" + (idCounter++),
      x1: startM.x, y1: startM.y,
      x2: end.x, y2: end.y,
      t: thicknessMM/1000
    });
    recomputeSpaces();
    return true;
  }

  function finishDrawing(clientX, clientY, altFree){
    if(!drawState) return;
    const end = computeEndpoint(clientX, clientY, altFree);
    commitSegment(drawState.startM, end);
    cancelDraw();
  }

  function cancelDraw(){
    drawState = null;
    previewWall = null;
    drawLengthOverlay.style.display = "none";
    setDrawLengthValue("");
    drawLengthUserEdited = false;
    clearTrackingLines();
    while(openingPreviewLayer.firstChild) openingPreviewLayer.removeChild(openingPreviewLayer.firstChild);
    renderInteriorWalls();
  }

  window.addEventListener("keydown", (e)=>{
    if(e.key !== "Escape") return;
    if(document.activeElement && document.activeElement.tagName === "INPUT") return;
    if(drawState){ cancelDraw(); }
    if(dimState){ cancelMeasure(); }
    if(activeTool !== "pan") setTool("pan");
  });

  // ---------- Rom (spaces): romnavn + m² via rasterisering/flood fill ----------
  let spaces = [];
  let spaceIdCounter = 1;

  function rasterizeWallsBitmap(){
    const canvas = document.createElement("canvas");
    canvas.width = vb.w; canvas.height = vb.h;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, vb.w, vb.h);
    ctx.fillStyle = "#000";
    getAllWallLinesPx().forEach(line => {
      const ptsStr = wallPolygonPoints({x:line.x1,y:line.y1}, {x:line.x2,y:line.y2}, line.t);
      const pts = ptsStr.split(" ").map(s => s.split(",").map(Number));
      ctx.beginPath();
      pts.forEach(([x,y], i) => i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
      ctx.closePath();
      ctx.fill();
    });
    const data = ctx.getImageData(0, 0, vb.w, vb.h).data;
    const bitmap = new Uint8Array(vb.w * vb.h);
    for(let i = 0; i < vb.w*vb.h; i++) bitmap[i] = data[i*4] < 128 ? 1 : 0;
    return bitmap;
  }

  function floodFillArea(bitmap, w, h, sx, sy){
    const start = sy*w + sx;
    if(sx < 0 || sy < 0 || sx >= w || sy >= h || bitmap[start]) return null;
    const visited = new Uint8Array(w*h);
    const queue = new Int32Array(w*h);
    let qHead = 0, qTail = 0;
    queue[qTail++] = start; visited[start] = 1;
    let count = 0;
    while(qHead < qTail){
      const idx = queue[qHead++];
      const x = idx % w, y = (idx / w) | 0;
      count++;
      if(x > 0){ const n = idx-1; if(!visited[n] && !bitmap[n]){ visited[n]=1; queue[qTail++]=n; } }
      if(x < w-1){ const n = idx+1; if(!visited[n] && !bitmap[n]){ visited[n]=1; queue[qTail++]=n; } }
      if(y > 0){ const n = idx-w; if(!visited[n] && !bitmap[n]){ visited[n]=1; queue[qTail++]=n; } }
      if(y < h-1){ const n = idx+w; if(!visited[n] && !bitmap[n]){ visited[n]=1; queue[qTail++]=n; } }
    }
    return { count, visited };
  }

  function recomputeSpaces(){
    if(spaces.length === 0) return;
    const bitmap = rasterizeWallsBitmap();
    spaces.forEach(sp => {
      const result = floodFillArea(bitmap, vb.w, vb.h, Math.round(sp.seedX), Math.round(sp.seedY));
      sp.areaM2 = result ? result.count/(M*M) : null;
    });
    renderSpaces();
  }

  function fmtArea(m2){
    if(m2 == null) return "–";
    if(displayUnit === "imperial"){
      const sqft = m2 / (M_PER_FOOT*M_PER_FOOT);
      return sqft.toFixed(1).replace(".", ",") + " SF";
    }
    return m2.toFixed(1).replace(".", ",") + " M²";
  }

  function floorTypeColor(floorType){
    const colors = {
      "Parquet": "rgba(185,140,80,0.28)",
      "Laminate": "rgba(190,185,175,0.35)",
      "Tiles":  "rgba(80,150,200,0.28)",
      "Concrete":  "rgba(140,140,140,0.25)",
      "Vinyl":   "rgba(120,190,130,0.24)",
      "Carpet":   "rgba(180,100,160,0.28)",
      "Marble":  "rgba(220,205,185,0.30)",
    };
    return colors[floorType] || null;
  }

  function buildFloorFillImage(sp){
    if(!sp.floorType) return null;
    const color = floorTypeColor(sp.floorType);
    if(!color) return null;
    const bitmap = rasterizeWallsBitmap();
    const result = floodFillArea(bitmap, vb.w, vb.h, Math.round(sp.seedX), Math.round(sp.seedY));
    if(!result) return null;
    const canvas = document.createElement("canvas");
    canvas.width = vb.w; canvas.height = vb.h;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = color;
    const imgData = ctx.createImageData(vb.w, vb.h);
    // Parse colour to RGBA
    const tmp = document.createElement("canvas");
    tmp.width = tmp.height = 1;
    const tc = tmp.getContext("2d");
    tc.fillStyle = color; tc.fillRect(0,0,1,1);
    const [r,g,b,a] = tc.getImageData(0,0,1,1).data;
    const d = imgData.data;
    for(let i = 0; i < result.visited.length; i++){
      if(result.visited[i]){
        const p = i*4;
        d[p]=r; d[p+1]=g; d[p+2]=b; d[p+3]=a;
      }
    }
    ctx.putImageData(imgData, 0, 0);
    return canvas.toDataURL("image/png");
  }

  function floorFillClass(floorType){
    if(!floorType) return null;
    return "space-fill-" + floorType.toLowerCase();
  }

  function renderSpaces(){
    while(spaceLayer.firstChild) spaceLayer.removeChild(spaceLayer.firstChild);
    spaces.forEach(sp => {
      const g = el("g", { class:"space-group" + (sp.areaM2 == null ? " invalid" : ""), "data-id": sp.id });

      // Gulvfarge — faktisk flood-fill som SVG image
      if(sp.floorType){
        const dataUrl = buildFloorFillImage(sp);
        if(dataUrl){
          const img = el("image", { href:dataUrl, x:0, y:0, width:vb.w, height:vb.h });
          img.style.pointerEvents = "none";
          g.appendChild(img);
        }
      }

      const nameText = el("text", { class:"space-name", x:sp.labelX, y:sp.labelY-4 });
      nameText.textContent = sp.name;
      g.appendChild(nameText);

      const areaText = el("text", { class:"space-area", x:sp.labelX, y:sp.labelY+12 });
      areaText.textContent = fmtArea(sp.areaM2);
      g.appendChild(areaText);

      // Gulvtype-annotasjon
      if(sp.floorType){
        const ftText = el("text", { class:"space-floor-type", x:sp.labelX, y:sp.labelY+24 });
        ftText.textContent = sp.floorType.toUpperCase();
        g.appendChild(ftText);
      }

      const del = el("g", { class:"space-delete", transform:`translate(${sp.labelX+46},${sp.labelY-14})` });
      del.appendChild(el("circle", { r:"7" }));
      const delText = el("text", { x:"0", y:"0.5" });
      delText.textContent = "×";
      del.appendChild(delText);
      del.addEventListener("pointerdown", (e)=>{
        e.stopPropagation();
        pushUndo();
        spaces = spaces.filter(s => s.id !== sp.id);
        renderSpaces();
      });
      g.appendChild(del);

      [nameText, areaText, ...(sp.floorType ? [g.querySelector(".space-floor-type")] : [])].filter(Boolean).forEach(t => t.addEventListener("pointerdown", (e)=>{
        if(activeTool === "pan"){
          e.stopPropagation();
          selectedObject = { type:"space", id: sp.id };
          renderSelectionRing();
          return;
        }
        if(activeTool !== "space") return;
        e.stopPropagation();
        const client = worldToClient(sp.labelX, sp.labelY);
        openNameInput(client.x, client.y, sp.name, (newName)=>{
          pushUndo();
          sp.name = newName || sp.name;
          renderSpaces();
        });
      }));

      spaceLayer.appendChild(g);
    });

    renderRoomSchedule();
  }

  function focusOnSpace(sp){
    view.x = vb.w/2 - sp.labelX*view.k;
    view.y = vb.h/2 - sp.labelY*view.k;
    updateTransform(true);
    setTimeout(()=> world.style.transition = "none", 520);
  }

  const roomSchedule = document.getElementById("roomSchedule");
  const roomScheduleList = document.getElementById("roomScheduleList");
  const roomScheduleCount = document.getElementById("roomScheduleCount");
  const roomScheduleTotal = document.getElementById("roomScheduleTotal");

  function renderRoomSchedule(){
    roomSchedule.classList.toggle("visible", spaces.length > 0);
    while(roomScheduleList.firstChild) roomScheduleList.removeChild(roomScheduleList.firstChild);

    let total = 0;
    spaces.forEach(sp => {
      if(sp.areaM2 != null) total += sp.areaM2;

      const row = document.createElement("div");
      row.className = "room-schedule-row";
      row.addEventListener("click", (e)=>{
        if(e.target.closest(".room-schedule-row-del")) return;
        focusOnSpace(sp);
      });

      const name = document.createElement("div");
      name.className = "room-schedule-row-name";
      name.textContent = sp.name;
      row.appendChild(name);

      const area = document.createElement("div");
      area.className = "room-schedule-row-area" + (sp.areaM2 == null ? " invalid" : "");
      area.textContent = fmtArea(sp.areaM2);
      row.appendChild(area);

      const del = document.createElement("div");
      del.className = "room-schedule-row-del";
      del.textContent = "×";
      del.addEventListener("click", (e)=>{
        e.stopPropagation();
        pushUndo();
        spaces = spaces.filter(s => s.id !== sp.id);
        renderSpaces();
      });
      row.appendChild(del);

      roomScheduleList.appendChild(row);
    });

    roomScheduleCount.textContent = spaces.length;
    roomScheduleTotal.textContent = fmtArea(total);
  }

  function worldToClient(wx, wy){
    const vbX = view.x + wx*view.k;
    const vbY = view.y + wy*view.k;
    const pt = stage.createSVGPoint();
    pt.x = vbX; pt.y = vbY;
    const ctm = stage.getScreenCTM();
    const p = pt.matrixTransform(ctm);
    return { x:p.x, y:p.y };
  }

  let hintTimer = null;
  function showSpaceHint(wx, wy, msg){
    spaceHint.setAttribute("x", wx);
    spaceHint.setAttribute("y", wy-20);
    spaceHint.textContent = msg;
    spaceHint.style.opacity = "1";
    clearTimeout(hintTimer);
    hintTimer = setTimeout(hideSpaceHint, 1400);
  }
  function hideSpaceHint(){ spaceHint.style.opacity = "0"; }

  const spaceNameInput = document.getElementById("spaceNameInput");
  let nameInputConfirm = null;

  const floorTypeOverlay = document.getElementById("floorTypeOverlay");
  const floorTypeSelect = document.getElementById("floorTypeSelect");
  const btnConfirmSpace = document.getElementById("btnConfirmSpace");
  let currentSpaceForFloor = null;

  btnConfirmSpace.addEventListener("mousedown", (e)=>{
    e.preventDefault(); // prevents blur on input
    closeNameInput(true);
  });

  function openNameInput(clientX, clientY, initialValue, onConfirm){
    nameInputConfirm = onConfirm;
    spaceNameInput.style.left = clientX + "px";
    spaceNameInput.style.top = clientY + "px";
    spaceNameInput.style.display = "block";
    spaceNameInput.value = initialValue || "";
    requestAnimationFrame(()=>{ spaceNameInput.focus(); spaceNameInput.select(); });
  }
  function openNameInputWithFloor(clientX, clientY, initialValue, initialFloor, sp, onConfirm){
    currentSpaceForFloor = sp;
    floorTypeSelect.value = initialFloor || "";
    floorTypeOverlay.style.left = clientX + "px";
    floorTypeOverlay.style.top = clientY + "px";
    floorTypeOverlay.style.display = "block";
    floorTypeSelect.onchange = ()=>{
      if(currentSpaceForFloor) currentSpaceForFloor.floorType = floorTypeSelect.value || null;
      renderSpaces();
    };
    openNameInput(clientX, clientY, initialValue, onConfirm);
  }
  function closeNameInput(confirm){
    if(spaceNameInput.style.display === "none") return;
    const value = spaceNameInput.value.trim();
    const cb = nameInputConfirm;
    spaceNameInput.style.display = "none";
    floorTypeOverlay.style.display = "none";
    currentSpaceForFloor = null;
    nameInputConfirm = null;
    if(confirm && cb) cb(value);
  }
  spaceNameInput.addEventListener("keydown", (e)=>{
    if(e.key === "Enter"){ e.preventDefault(); closeNameInput(true); }
    if(e.key === "Escape"){ spaceNameInput.value = ""; closeNameInput(false); }
  });
  spaceNameInput.addEventListener("blur", ()=>{
    setTimeout(()=>{
      if(document.activeElement !== floorTypeSelect) closeNameInput(true);
    }, 150);
  });
  floorTypeSelect.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" || e.key === "Tab"){ e.preventDefault(); closeNameInput(true); }
    if(e.key === "Escape"){ closeNameInput(false); }
  });
  floorTypeSelect.addEventListener("blur", ()=>{
    setTimeout(()=>{
      if(document.activeElement !== spaceNameInput) closeNameInput(true);
    }, 150);
  });

  function tryCreateSpaceAt(clientX, clientY){
    const w = toWorldPoint(clientX, clientY);
    const bitmap = rasterizeWallsBitmap();
    const sx = Math.round(w.x), sy = Math.round(w.y);
    const result = floodFillArea(bitmap, vb.w, vb.h, sx, sy);
    if(!result){
      showSpaceHint(w.x, w.y, "CLICK INSIDE A CLOSED ROOM");
      return;
    }
    const existing = spaces.find(sp => {
      const esx = Math.round(sp.seedX), esy = Math.round(sp.seedY);
      if(esx < 0 || esy < 0 || esx >= vb.w || esy >= vb.h) return false;
      return result.visited[esy*vb.w + esx] === 1;
    });
    if(existing){
      // Rom finnes – åpne redigering med gulvtype
      const client = worldToClient(w.x, w.y);
      openNameInputWithFloor(client.x, client.y, existing.name, existing.floorType, existing, (name)=>{
        pushUndo();
        existing.name = name || existing.name;
        renderSpaces();
      });
      return;
    }
    const areaM2 = result.count/(M*M);
    const client = worldToClient(w.x, w.y);
    const newSp = {
      id: "sp-" + spaceIdCounter,
      name: "",
      areaM2, seedX:w.x, seedY:w.y, labelX:w.x, labelY:w.y,
      floorType: null
    };
    openNameInputWithFloor(client.x, client.y, "", null, newSp, (name)=>{
      pushUndo();
      newSp.name = name || ("Rom " + spaceIdCounter);
      spaces.push(newSp);
      spaceIdCounter++;
      renderSpaces();
    });
  }

  // ---------- Pointer-routing på stage (pan vs. tegn) ----------
  let dragging = false, last = null;

  stage.addEventListener("pointerdown", (e)=>{
    if(activeTool === "draw"){
      if(chainMode && drawState){
        const end = computeEndpoint(e.clientX, e.clientY, e.altKey);
        const committed = commitSegment(drawState.startM, end);
        if(!committed){ cancelDraw(); return; }
        drawState = { startM: end, rawStartPx: roomMetersToWorldPx(end.x, end.y), anchorResolved:true };
        drawLengthUserEdited = false;
        setDrawLengthValue("");
        updatePreview(e.clientX, e.clientY, e.altKey);
        return;
      }
      startDrawing(e);
      return;
    }
    if(activeTool === "erase"){ return; }
    if(activeTool === "space"){ tryCreateSpaceAt(e.clientX, e.clientY); return; }
    if(activeTool === "opening"){
      if(selectedOpeningId){
        selectedOpeningId = null;
        renderOpenings();
        return;
      }
      tryCreateOpeningAt(e.clientX, e.clientY);
      return;
    }
    if(activeTool === "measure"){ measurePointerDown(e.clientX, e.clientY); return; }
    if(activeTool === "gridline"){ tryCreateGridLine(e.clientX, e.clientY); return; }
    if(activeTool === "edit"){
      if(selectedWallId){
        selectedWallId = null;
        thicknessControl.style.display = "none";
        lengthDivider.style.display = "none";
        lengthInput.style.display = "none";
        lengthUnit.style.display = "none";
        renderInteriorWalls();
      }
      return;
    }
    // I pan-modus: klikk på tom canvas rydder selection; drag panorerer
    if(selectedObject){ clearSelection(); return; }
    dragging = true; last = { x:e.clientX, y:e.clientY };
    stage.classList.add("grabbing");
    stage.setPointerCapture(e.pointerId);
  });

  // ---------- Seleksjon i pan-modus (↖ Velg) ----------
  let selectedObject = null; // { type:'opening'|'wall', id }

  function clearSelection(){
    selectedObject = null;
    selectedOpeningId = null;
    renderOpenings();     // skjuler redigeringspanelet
    renderSelectionRing();
  }

  const wallInfoOverlay = document.getElementById("wallInfoOverlay");

  function infoRow(label, value){
    return `<div class="wall-info-row"><span class="wall-info-label">${label}</span><span class="wall-info-value">${value}</span></div>`;
  }

  function showInfoOverlayAt(worldX, worldY, rowsHtml){
    const client = worldToClient(worldX, worldY - 20);
    wallInfoOverlay.style.left = client.x + "px";
    wallInfoOverlay.style.top = client.y + "px";
    wallInfoOverlay.style.display = "flex";
    wallInfoOverlay.innerHTML = rowsHtml;
  }

  // Viser en flytende infoboks for det som er valgt i select-modus (vegg, åpning, rom, gridlinje).
  function updateInfoOverlay(){
    if(!selectedObject){ wallInfoOverlay.style.display = "none"; return; }

    if(selectedObject.type === "wall"){
      const w = interiorWalls.find(x => x.id === selectedObject.id);
      if(!w){ wallInfoOverlay.style.display = "none"; return; }
      const lenM = Math.hypot(w.x2-w.x1, w.y2-w.y1);
      const mid = roomMetersToWorldPx((w.x1+w.x2)/2, (w.y1+w.y2)/2);
      showInfoOverlayAt(mid.x, mid.y,
        infoRow("ID", w.id) +
        infoRow("Lengde", formatLength(lenM)) +
        infoRow("Tykkelse", formatLength(w.t)) +
        infoRow("Start", `${w.x1.toFixed(2)}, ${w.y1.toFixed(2)} m`) +
        infoRow("Slutt", `${w.x2.toFixed(2)}, ${w.y2.toFixed(2)} m`));
      return;
    }

    if(selectedObject.type === "opening"){
      const op = openings.find(o => o.id === selectedObject.id);
      if(!op){ wallInfoOverlay.style.display = "none"; return; }
      const w = interiorWalls.find(x => x.id === op.wallId);
      if(!w){ wallInfoOverlay.style.display = "none"; return; }
      const g = wallGeometryPx(w);
      const sPx = op.s*M;
      const midX = g.p1.x + g.ux*sPx, midY = g.p1.y + g.uy*sPx;
      showInfoOverlayAt(midX, midY,
        infoRow("ID", op.id) +
        infoRow("Type", op.type === "door" ? "Dør" : "Vindu") +
        infoRow("Bredde", formatLength(op.width)) +
        infoRow("Vegg", op.wallId) +
        infoRow("Posisjon", formatLength(op.s) + " fra start"));
      return;
    }

    if(selectedObject.type === "space"){
      const sp = spaces.find(x => x.id === selectedObject.id);
      if(!sp){ wallInfoOverlay.style.display = "none"; return; }
      showInfoOverlayAt(sp.labelX, sp.labelY,
        infoRow("ID", sp.id) +
        infoRow("Navn", sp.name || "–") +
        infoRow("Areal", fmtArea(sp.areaM2)) +
        infoRow("Gulvtype", sp.floorType || "–"));
      return;
    }

    if(selectedObject.type === "gridline"){
      const g = archGridLines.find(x => x.id === selectedObject.id);
      if(!g){ wallInfoOverlay.style.display = "none"; return; }
      const bp = gridLineBubblePos(g)[0];
      showInfoOverlayAt(bp.x, bp.y,
        infoRow("ID", g.id) +
        infoRow("Etikett", g.label) +
        infoRow("Akse", g.axis === "y" ? "Vertikal (tall)" : "Horisontal (bokstav)") +
        infoRow("Posisjon", formatLength(g.pos)));
      return;
    }

    if(selectedObject.type === "dimension"){
      const d = dimensions.find(x => x.id === selectedObject.id);
      if(!d){ wallInfoOverlay.style.display = "none"; return; }
      const lenM = Math.hypot(d.x2-d.x1, d.y2-d.y1);
      const mid = roomMetersToWorldPx((d.x1+d.x2)/2, (d.y1+d.y2)/2);
      showInfoOverlayAt(mid.x, mid.y,
        infoRow("ID", d.id) +
        infoRow("Lengde", formatLength(lenM)) +
        infoRow("Start", `${d.x1.toFixed(2)}, ${d.y1.toFixed(2)} m`) +
        infoRow("Slutt", `${d.x2.toFixed(2)}, ${d.y2.toFixed(2)} m`));
      return;
    }

    wallInfoOverlay.style.display = "none";
  }

  function renderSelectionRing(){
    while(highlightLayer.firstChild) highlightLayer.removeChild(highlightLayer.firstChild);
    updateInfoOverlay();
    if(!selectedObject) return;
    if(selectedObject.type === "opening"){
      const op = openings.find(o => o.id === selectedObject.id);
      if(!op) return;
      const w = interiorWalls.find(x => x.id === op.wallId);
      if(!w) return;
      const g = wallGeometryPx(w);
      const sPx = op.s*M, wPx = op.width*M, half = g.t/2 + 4/view.k;
      const aX = g.p1.x + g.ux*(sPx-wPx/2), aY = g.p1.y + g.uy*(sPx-wPx/2);
      const bX = g.p1.x + g.ux*(sPx+wPx/2), bY = g.p1.y + g.uy*(sPx+wPx/2);
      const pts = [
        {x:aX+g.nx*half, y:aY+g.ny*half},{x:bX+g.nx*half, y:bY+g.ny*half},
        {x:bX-g.nx*half, y:bY-g.ny*half},{x:aX-g.nx*half, y:aY-g.ny*half},
      ].map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
      highlightLayer.appendChild(el("polygon", { points:pts, class:"selection-ring" }));
    }
    if(selectedObject.type === "wall"){
      const w = interiorWalls.find(x => x.id === selectedObject.id);
      if(!w) return;
      const p1 = roomMetersToWorldPx(w.x1, w.y1);
      const p2 = roomMetersToWorldPx(w.x2, w.y2);
      const pts = wallPolygonPoints(p1, p2, w.t*M + 8/view.k);
      highlightLayer.appendChild(el("polygon", { points:pts, class:"selection-ring" }));
    }
    if(selectedObject.type === "space"){
      const sp = spaces.find(x => x.id === selectedObject.id);
      if(!sp) return;
      const r = 44 / view.k;
      highlightLayer.appendChild(el("circle", { cx:sp.labelX, cy:sp.labelY-4, r, class:"selection-ring", fill:"none" }));
    }
    if(selectedObject.type === "gridline"){
      const g = archGridLines.find(x => x.id === selectedObject.id);
      if(!g) return;
      const bp = gridLineBubblePos(g)[0];
      const r = 18 / view.k;
      highlightLayer.appendChild(el("circle", { cx:bp.x, cy:bp.y, r, class:"selection-ring", fill:"none" }));
    }
    if(selectedObject.type === "dimension"){
      const d = dimensions.find(x => x.id === selectedObject.id);
      if(!d) return;
      const g = dimGeometryPx(d);
      const grp = buildDimensionGroup(g.p1, g.p2, d.offset*M, Math.hypot(d.x2-d.x1,d.y2-d.y1), false, null);
      grp.classList.add("selection-ring-dim");
      highlightLayer.appendChild(grp);
    }
  }

  // Koble klikk på åpninger i pan-modus
  function attachPanSelectToOpening(grp, op){
    grp.addEventListener("pointerdown", (e)=>{
      if(activeTool !== "pan") return;
      e.stopPropagation();
      if(selectedObject?.id === op.id){
        // Allerede valgt — start drag langs veggen via stage (grp gjenskapes ved renderOpenings)
        const wallObj = interiorWalls.find(x => x.id === op.wallId);
        if(!wallObj) return;
        pushUndo();
        stage.setPointerCapture(e.pointerId);
        const p1 = roomMetersToWorldPx(wallObj.x1, wallObj.y1);
        const p2 = roomMetersToWorldPx(wallObj.x2, wallObj.y2);
        const dx = p2.x-p1.x, dy = p2.y-p1.y;
        const lenPx = Math.hypot(dx,dy)||0.0001;
        const ux = dx/lenPx, uy = dy/lenPx;
        let moved = false;
        const onMove = (ev)=>{
          moved = true;
          const liveOp = openings.find(o => o.id === op.id);
          if(!liveOp) return;
          const w2 = toWorldPoint(ev.clientX, ev.clientY);
          const vx = w2.x-p1.x, vy = w2.y-p1.y;
          const sPx = vx*ux + vy*uy;
          const wPx = liveOp.width*M, clearPx = OPENING_MIN_CLEARANCE*M;
          liveOp.s = snap5(Math.min(Math.max(sPx, wPx/2+clearPx), lenPx-wPx/2-clearPx)/M);
          renderOpenings();
          renderSelectionRing();
          renderOpeningPreviewDims({ wallId: liveOp.wallId, sPx: liveOp.s*M, wPx, lenPx });
        };
        const onUp = ()=>{
          stage.releasePointerCapture(e.pointerId);
          stage.removeEventListener("pointermove", onMove);
          stage.removeEventListener("pointerup", onUp);
          while(openingPreviewLayer.firstChild) openingPreviewLayer.removeChild(openingPreviewLayer.firstChild);
          if(moved) recomputeSpaces();
        };
        stage.addEventListener("pointermove", onMove);
        stage.addEventListener("pointerup", onUp);
      } else {
        selectedObject = { type:"opening", id: op.id };
        selectedOpeningId = op.id;   // kobler inn redigeringspanelet
        renderSelectionRing();
        renderOpenings();             // oppdaterer panelet via updateOpeningEditOverlay
      }
    });
  }

  stage.addEventListener("dblclick", (e)=>{
    if(activeTool === "draw" && chainMode && drawState){
      e.preventDefault();
      const end = computeEndpoint(e.clientX, e.clientY, e.altKey);
      commitSegment(drawState.startM, end);
      cancelDraw();
    }
  });

  stage.addEventListener("pointermove", (e)=>{
    if(activeTool === "draw" || activeTool === "measure" || activeTool === "edit"){
      const wp = toWorldPoint(e.clientX, e.clientY);
      renderSnapMarker(resolveSnapMarker(wp.x, wp.y));
    } else {
      renderSnapMarker(null);
    }

    if(activeTool === "draw" && drawState){
      updatePreview(e.clientX, e.clientY, e.altKey);
      return;
    }
    if(activeTool === "measure" && dimState){
      measurePointerMove(e.clientX, e.clientY);
      return;
    }
    if(activeTool === "opening"){
      openingPreview = computeOpeningPreview(e.clientX, e.clientY);
      renderOpeningPreview();
      return;
    }
    if(activeTool === "gridline"){
      const w = toWorldPoint(e.clientX, e.clientY);
      const m = worldPxToRoomMeters(w.x, w.y);
      const pos = snap5(gridLineAxis === "y" ? m.x : m.y);
      renderGridLineDims("__preview__", pos);
      return;
    }
    if(!dragging) return;
    const scaleRatio = vb.w / stage.getBoundingClientRect().width;
    view.x += (e.clientX - last.x) * scaleRatio;
    view.y += (e.clientY - last.y) * scaleRatio;
    last = { x:e.clientX, y:e.clientY };
    updateTransform(false);
  });

  function endDrag(e){
    if(activeTool === "draw" && drawState && !chainMode){
      finishDrawing(e.clientX, e.clientY, e.altKey);
      return;
    }
    dragging = false;
    stage.classList.remove("grabbing");
  }
  stage.addEventListener("pointerup", endDrag);
  stage.addEventListener("pointerleave", (e)=>{ renderSnapMarker(null); if(!drawState) endDrag(e); });

  stage.addEventListener("wheel", (e)=>{
    e.preventDefault();
    const p = toViewBox(e.clientX, e.clientY);
    const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
    zoomAt(p.x, p.y, factor);
  }, { passive:false });

  document.getElementById("zoomIn").addEventListener("click", ()=> zoomAt(vb.w/2, vb.h/2, 1.2));
  document.getElementById("zoomOut").addEventListener("click", ()=> zoomAt(vb.w/2, vb.h/2, 1/1.2));
  document.getElementById("zoomReset").addEventListener("click", ()=>{
    view.x = 0; view.y = 0; view.k = 1;
    updateTransform(true);
    setTimeout(()=> world.style.transition = "none", 520);
  });

})();
</script>
</body>
</html>
