<script>
(function(){
  "use strict";

  // ---------- Geometri: 4,0 × 3,0 m rom, 200mm vegger ----------
  const M = 130;              // px per meter (viewBox-enheter) ved k=1
  const roomW = 4.0, roomH = 3.0;
  const t = 0.2;               // veggtykkelse i meter (ytterveggene)
  const outerW = (roomW + t) * M;
  const outerH = (roomH + t) * M;
  const tp = t * M;

  const vb = { w: 1000, h: 700 };
  const originX = vb.w/2 - outerW/2;
  const originY = vb.h/2 - outerH/2;

  // Gjør veggradienten global (samme lysretning for alle vegger), ikke per form,
  // ellers får hver vegg sin egen gradient og skjøtene syns som fargesprang i Polish.
  const wallGradEl = document.getElementById("wallGrad");
  wallGradEl.setAttribute("gradientUnits", "userSpaceOnUse");
  wallGradEl.setAttribute("x1", originX);
  wallGradEl.setAttribute("y1", originY);
  wallGradEl.setAttribute("x2", originX + outerW);
  wallGradEl.setAttribute("y2", originY + outerH);

  const svgns = "http://www.w3.org/2000/svg";
  function el(tag, attrs){
    const e = document.createElementNS(svgns, tag);
    for(const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  const world = document.getElementById("world");

  // Disse må deklareres tidlig — brukes av renderGrid() som kalles av updateTransform()
  // som igjen kalles allerede på linje ~726, lenge før resten av koden kjøres.
  let gridEnabled = true;
  let snapEnabled = true;
  let archGridLines = [];
  let archGridIdCounter = 1;
  let selectedGridLineId = null;
  const ALPHA = "ABCDEFGHJKLMNPQRSTUVWXYZ";

  // Rutenett — tegnes FØR vegger, slik at alt geometri er oppå det
  const gridLayer = el("g", { id:"gridLayer" });
  world.appendChild(gridLayer);

  // Walls — drafting (to lag: strøk under, fyll over -> skjøter smelter sammen)
  const gDraft = el("g", { id:"wallsDrafting" });
  const draftStrokes = el("g", { id:"draftStrokes" });
  const draftFills = el("g", { id:"draftFills" });
  gDraft.appendChild(draftStrokes);
  gDraft.appendChild(draftFills);
  world.appendChild(gDraft);

  // Walls — polish (samme to-lags prinsipp)
  const gPolish = el("g", { id:"wallsPolish", filter:"url(#wallShadow)" });
  const polishStrokes = el("g", { id:"polishStrokes" });
  const polishFills = el("g", { id:"polishFills" });
  gPolish.appendChild(polishStrokes);
  gPolish.appendChild(polishFills);
  world.appendChild(gPolish);

  // Lag for dører/vinduer — over veggene, felles for begge moduser
  const openingsLayer = el("g", { id:"openingsLayer" });
  world.appendChild(openingsLayer);

  // Lag for målsettingslinjer
  const measureLayer = el("g", { id:"measureLayer" });
  world.appendChild(measureLayer);

  // Arkitekt-gridlinjer (A/B/C… og 1/2/3…)
  const gridLineLayer = el("g", { id:"gridLineLayer" });
  world.appendChild(gridLineLayer);

  // Midlertidige mål under gridlinje-drag/plassering
  const gridLineDimLayer = el("g", { id:"gridLineDimLayer" });
  gridLineDimLayer.style.pointerEvents = "none";
  world.appendChild(gridLineDimLayer);

  // Lag for midlertidige mål ved plassering av dør/vindu (som i Revit)
  const openingPreviewLayer = el("g", { id:"openingPreviewLayer" });
  openingPreviewLayer.style.pointerEvents = "none";
  world.appendChild(openingPreviewLayer);

  // Lag helt øverst for hover/valgt-kontur (alltid synlig, uavhengig av skjøter)
  const highlightLayer = el("g", { id:"highlightLayer" });
  highlightLayer.style.pointerEvents = "none";

  // Lag for målingstekst under tegning/redigering
  const drawLabel = el("text", { class:"draw-label", "text-anchor":"middle", opacity:"0" });
  world.appendChild(drawLabel);

  // Lag for rom (spaces): navn + m²
  const spaceLayer = el("g", { id:"spaceLayer" });
  world.appendChild(spaceLayer);

  // Kort tilbakemelding, f.eks. "Klikk inni et lukket rom"
  const spaceHint = el("text", { class:"space-hint", "text-anchor":"middle" });
  spaceHint.style.pointerEvents = "none";
  world.appendChild(spaceHint);

  world.appendChild(highlightLayer);

  // Lag for dra-håndtak (endepunkter) på valgt vegg, alltid øverst
  const editHandles = el("g", { id:"editHandles" });
  world.appendChild(editHandles);

  // Tracking lines — hjelpelinjer som vises live under tegning
  const trackingLayer = el("g", { id:"trackingLayer" });
  trackingLayer.style.pointerEvents = "none";
  world.appendChild(trackingLayer);

  // Snap-markør (vertex/edge/face), helt øverst av alle
  const snapMarkerLayer = el("g", { id:"snapMarkerLayer" });
  snapMarkerLayer.style.pointerEvents = "none";
  world.appendChild(snapMarkerLayer);

  requestAnimationFrame(()=>{ world.classList.add("ready"); if(typeof renderGrid === "function") renderGrid(); });

  // ---------- Mode toggle (Drafting / Polish) ----------
  const body = document.body;
  const btnDrafting = document.getElementById("btnDrafting");
  const btnPolish = document.getElementById("btnPolish");

  function setMode(mode){
    body.setAttribute("data-mode", mode);
    btnDrafting.classList.toggle("active", mode === "drafting");
    btnPolish.classList.toggle("active", mode === "polish");
    btnDrafting.setAttribute("aria-pressed", mode === "drafting");
    btnPolish.setAttribute("aria-pressed", mode === "polish");
  }
  btnDrafting.addEventListener("click", () => setMode("drafting"));
  btnPolish.addEventListener("click", () => setMode("polish"));

  // ---------- Tema (mørk / lys) ----------
  const btnTheme = document.getElementById("btnTheme");
  function setTheme(theme){
    body.setAttribute("data-theme", theme);
    btnTheme.textContent = theme === "light" ? "☀" : "☾";
  }
  btnTheme.addEventListener("click", ()=>{
    setTheme(body.getAttribute("data-theme") === "light" ? "dark" : "light");
  });

  // ---------- Pan & zoom ----------
  const stage = document.getElementById("stage");
  const view = { x:0, y:0, k:1 };
  const K_MIN = 0.5, K_MAX = 5;

  // renderGrid MÅ defineres her — den kalles av updateTransform nedenfor
  const GRID_SIZES_M = [0.01, 0.05, 0.1, 0.25, 0.5, 1, 2, 5, 10, 25, 50, 100];
  const SUBDIVISIONS = 5;
  const MIN_SPACING_PX = 14;
  const MAX_EXTENT_M = 500;

  function renderGrid(){
    while(gridLayer.firstChild) gridLayer.removeChild(gridLayer.firstChild);
    if(!gridEnabled) return;
    // roomMetersToWorldPx / worldPxToRoomMeters er definert etter denne funksjonen,
    // men kalles kun VED RUN-TIME (ikke ved definisjonstidspunktet), så det er trygt.
    let coarseIdx = GRID_SIZES_M.length - 1;
    for(let i = 0; i < GRID_SIZES_M.length; i++){
      if(GRID_SIZES_M[i] * M * view.k >= MIN_SPACING_PX){ coarseIdx = i; break; }
    }
    const coarseM = GRID_SIZES_M[coarseIdx];
    const fineM = coarseM / SUBDIVISIONS;
    const showFine = fineM * M * view.k >= MIN_SPACING_PX;
    const visX0 = ((-view.x/view.k) - originX)/M - 1;
    const visX1 = (((-view.x + vb.w)/view.k) - originX)/M + 1;
    const visY0 = ((-view.y/view.k) - originY)/M - 1;
    const visY1 = (((-view.y + vb.h)/view.k) - originY)/M + 1;
    function clampedLinePx(isVert, valM, clsName){
      const px = isVert ? originX + valM*M : originY + valM*M;
      const x1 = isVert ? px : originX + Math.max(visX0,-MAX_EXTENT_M)*M;
      const y1 = isVert ? originY + Math.max(visY0,-MAX_EXTENT_M)*M : px;
      const x2 = isVert ? px : originX + Math.min(visX1,MAX_EXTENT_M)*M;
      const y2 = isVert ? originY + Math.min(visY1,MAX_EXTENT_M)*M : px;
      return el("line", { x1, y1, x2, y2, class:clsName });
    }
    const useM = showFine ? fineM : coarseM;
    const startX = Math.ceil(Math.max(visX0,-MAX_EXTENT_M)/useM)*useM;
    const startY = Math.ceil(Math.max(visY0,-MAX_EXTENT_M)/useM)*useM;
    const eps = useM*0.001;
    // Origo = nedre venstre ytterhjørne, beregnet fra faktiske vegger.
    // Bruker try/catch siden interiorWalls er deklarert med let og kan mangle ved første kall.
    let axisOriginX = 0, axisOriginY = roomH + t;
    try {
      if(interiorWalls && interiorWalls.length > 0){
        let minX = Infinity, maxY = -Infinity;
        interiorWalls.forEach(w => {
          const p1 = roomMetersToWorldPx(w.x1, w.y1);
          const p2 = roomMetersToWorldPx(w.x2, w.y2);
          const dx = p2.x-p1.x, dy = p2.y-p1.y;
          const len = Math.hypot(dx,dy)||0.0001;
          const ux = dx/len, uy = dy/len;
          const nx = -uy, ny = ux;
          const half = w.t*M/2;
          const a = { x:p1.x-ux*half, y:p1.y-uy*half };
          const b = { x:p2.x+ux*half, y:p2.y+uy*half };
          [{x:a.x+nx*half,y:a.y+ny*half},{x:a.x-nx*half,y:a.y-ny*half},
           {x:b.x+nx*half,y:b.y+ny*half},{x:b.x-nx*half,y:b.y-ny*half}]
          .forEach(pt => {
            const m = worldPxToRoomMeters(pt.x, pt.y);
            if(m.x < minX) minX = m.x;
            if(m.y > maxY) maxY = m.y;
          });
        });
        if(isFinite(minX)) axisOriginX = minX;
        if(isFinite(maxY)) axisOriginY = maxY;
      }
    } catch(e) { /* interiorWalls not ready yet */ }
    for(let x = startX; x <= Math.min(visX1,MAX_EXTENT_M)+eps; x += useM){
      const isCoarse = Math.abs(x%coarseM)<eps || Math.abs(x%coarseM-coarseM)<eps;
      const isAxis = Math.abs(x - axisOriginX)<eps;
      gridLayer.appendChild(clampedLinePx(true, x, isAxis?"grid-axis-y":isCoarse?"grid-line-coarse":"grid-line-fine"));
    }
    for(let y = startY; y <= Math.min(visY1,MAX_EXTENT_M)+eps; y += useM){
      const isCoarse = Math.abs(y%coarseM)<eps || Math.abs(y%coarseM-coarseM)<eps;
      const isAxis = Math.abs(y - axisOriginY)<eps;
      gridLayer.appendChild(clampedLinePx(false, y, isAxis?"grid-axis-x":isCoarse?"grid-line-coarse":"grid-line-fine"));
    }
  }

  function updateTransform(withEase){
    world.style.transition = withEase ? "transform .5s cubic-bezier(.2,.7,.2,1)" : "none";
    world.style.transform = `translate(${view.x}px,${view.y}px) scale(${view.k})`;
    if(typeof renderGrid === "function") renderGrid();
    if(typeof renderArchGridLines === "function") renderArchGridLines();
  }
  updateTransform(false);

  function toViewBox(clientX, clientY){
    const pt = stage.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const ctm = stage.getScreenCTM();
    if(!ctm) return { x:0, y:0 };
    const inv = ctm.inverse();
    const p = pt.matrixTransform(inv);
    return { x:p.x, y:p.y };
  }

  // Skjerm -> verdenskoordinater (samme rom som originX/tp/M er definert i)
  function toWorldPoint(clientX, clientY){
    const s = toViewBox(clientX, clientY);
    return { x: (s.x - view.x)/view.k, y: (s.y - view.y)/view.k };
  }

  function zoomAt(px, py, factor){
    const newK = Math.min(K_MAX, Math.max(K_MIN, view.k * factor));
    const r = newK / view.k;
    view.x = px - (px - view.x) * r;
    view.y = py - (py - view.y) * r;
    view.k = newK;
    updateTransform(false);
  }

  // ---------- Verktøy: Se / Tegn / Rediger / Slett / Rom / Åpning ----------
  let activeTool = "pan";
  let selectedWallId = null;
  const toolPan = document.getElementById("toolPan");
  const toolDraw = document.getElementById("toolDraw");
  const toolEdit = document.getElementById("toolEdit");
  const toolErase = document.getElementById("toolErase");
  const toolSpace = document.getElementById("toolSpace");
  const toolOpening = document.getElementById("toolOpening");
  const toolMeasure = document.getElementById("toolMeasure");
  const toolGridLine = document.getElementById("toolGridLine");
  const thicknessControl = document.getElementById("thicknessControl");
  const thicknessInput = document.getElementById("thicknessInput");
  const openingControl = document.getElementById("openingControl");
  const gridLineControl = document.getElementById("gridLineControl");
  const chainToggle = document.getElementById("chainToggle");
  const chainDivider = document.getElementById("chainDivider");
  const lengthDivider = document.getElementById("lengthDivider");
  const lengthInput = document.getElementById("lengthInput");
  const lengthUnit = document.getElementById("lengthUnit");

  let thicknessMM = parseInt(thicknessInput.value, 10);

  function setTool(tool){
    activeTool = tool;
    [toolPan, toolDraw, toolEdit, toolErase, toolSpace, toolOpening, toolMeasure, toolGridLine].forEach(b => { b.classList.remove("active", "danger"); b.setAttribute("aria-pressed","false"); });
    if(tool === "pan"){ toolPan.classList.add("active"); toolPan.setAttribute("aria-pressed","true"); }
    if(tool === "draw"){ toolDraw.classList.add("active"); toolDraw.setAttribute("aria-pressed","true"); }
    if(tool === "edit"){ toolEdit.classList.add("active"); toolEdit.setAttribute("aria-pressed","true"); }
    if(tool === "erase"){ toolErase.classList.add("active","danger"); toolErase.setAttribute("aria-pressed","true"); }
    if(tool === "space"){ toolSpace.classList.add("active"); toolSpace.setAttribute("aria-pressed","true"); }
    if(tool === "opening"){ toolOpening.classList.add("active"); toolOpening.setAttribute("aria-pressed","true"); }
    if(tool === "measure"){ toolMeasure.classList.add("active"); toolMeasure.setAttribute("aria-pressed","true"); }
    if(tool === "gridline"){ toolGridLine.classList.add("active"); toolGridLine.setAttribute("aria-pressed","true"); }

    stage.classList.remove("tool-draw","tool-erase","tool-edit","tool-space","tool-opening","tool-measure","tool-gridline");
    if(tool === "draw") stage.classList.add("tool-draw");
    if(tool === "erase") stage.classList.add("tool-erase");
    if(tool === "edit") stage.classList.add("tool-edit");
    if(tool === "space") stage.classList.add("tool-space");
    if(tool === "opening") stage.classList.add("tool-opening");
    if(tool === "measure") stage.classList.add("tool-measure");
    if(tool === "gridline") stage.classList.add("tool-gridline");

    if(tool !== "edit"){ selectedWallId = null; }
    if(tool !== "space") hideSpaceHint();
    if(tool !== "space") closeNameInput(false);
    if(tool !== "draw") chainMode = false;
    if(tool !== "measure") cancelMeasure();
    if(tool !== "opening"){ openingPreview = null; renderOpeningPreview(); selectedOpeningId = null; renderOpenings(); }
    if(tool !== "pan" && typeof selectedObject !== "undefined" && selectedObject){ selectedObject = null; if(typeof renderSelectionRing === "function") renderSelectionRing(); }
    if(tool !== "gridline"){ selectedGridLineId = null; renderArchGridLines(); renderGridLineDims(null, null); }
    renderSnapMarker(null);

    chainToggle.style.display = (tool === "draw") ? "inline-flex" : "none";
    chainDivider.style.display = (tool === "draw") ? "block" : "none";
    chainToggle.classList.toggle("active", chainMode);

    const showLength = tool === "edit" && !!selectedWallId;
    lengthDivider.style.display = showLength ? "block" : "none";
    lengthInput.style.display = showLength ? "inline-block" : "none";
    lengthUnit.style.display = showLength ? "inline" : "none";
    if(showLength) syncLengthInput();

    if(tool === "draw"){
      thicknessInput.value = thicknessMM;
      thicknessControl.style.display = "flex";
    } else if(tool === "edit"){
      thicknessControl.style.display = selectedWallId ? "flex" : "none";
    } else {
      thicknessControl.style.display = "none";
    }
    openingControl.style.display = (tool === "opening") ? "flex" : "none";
    gridLineControl.style.display = (tool === "gridline") ? "flex" : "none";

    if(tool !== "draw") cancelDraw();
    renderInteriorWalls();
  }
  toolPan.addEventListener("click", ()=> setTool("pan"));
  toolDraw.addEventListener("click", ()=> setTool("draw"));
  toolEdit.addEventListener("click", ()=> setTool("edit"));
  toolErase.addEventListener("click", ()=> setTool("erase"));
  toolSpace.addEventListener("click", ()=> setTool("space"));
  toolOpening.addEventListener("click", ()=> setTool("opening"));
  toolMeasure.addEventListener("click", ()=> setTool("measure"));
  toolGridLine.addEventListener("click", ()=> setTool("gridline"));

  // ---------- Kjede-tegning ----------
  let chainMode = false;
  chainToggle.addEventListener("click", ()=>{
    chainMode = !chainMode;
    chainToggle.classList.toggle("active", chainMode);
    if(!chainMode) cancelDraw();
  });

  // ---------- Eksakt lengde på valgt vegg ----------
  function formatLengthValueOnly(meters){
    if(displayUnit === "mm") return String(Math.round(meters*1000));
    if(displayUnit === "cm") return (meters*100).toFixed(1).replace(".", ",");
    if(displayUnit === "imperial"){
      const p = metersToImperialParts(meters);
      return p.feet + "'-" + p.wholeInches + fracString(p.remEighths) + '"';
    }
    return meters.toFixed(2).replace(".", ",");
  }
  function unitLabel(){
    if(displayUnit === "mm") return "MM";
    if(displayUnit === "cm") return "CM";
    if(displayUnit === "imperial") return "";
    return "M";
  }

  function syncLengthInput(){
    if(!selectedWallId) return;
    const w = interiorWalls.find(x => x.id === selectedWallId);
    if(!w) return;
    const lenM = Math.hypot(w.x2-w.x1, w.y2-w.y1);
    lengthInput.value = formatLengthValueOnly(lenM);
    lengthUnit.textContent = unitLabel();
  }
  lengthInput.addEventListener("focus", ()=>{
    if(activeTool === "edit" && selectedWallId) pushUndo();
  });
  function applyLengthMeters(newLen){
    const w = interiorWalls.find(x => x.id === selectedWallId);
    if(!w) return;
    const dx = w.x2-w.x1, dy = w.y2-w.y1;
    const curLen = Math.hypot(dx,dy) || 0.0001;
    const ux = dx/curLen, uy = dy/curLen;
    newLen = Math.max(0.015, newLen);
    const deps = findAttachedWalls(w.id);
    w.x2 = snap5(w.x1 + ux*newLen);
    w.y2 = snap5(w.y1 + uy*newLen);
    updateWallGeometryDom(w.id);
    propagateAttached(w.id, deps);
    renderOpenings();
    updateHighlight();
    renderEditHandles();
  }
  lengthInput.addEventListener("input", ()=>{
    const val = parseLength(lengthInput.value);
    if(Number.isNaN(val) || val < 0.015) return;
    applyLengthMeters(val);
  });
  lengthInput.addEventListener("blur", ()=>{
    let val = parseLength(lengthInput.value);
    if(Number.isNaN(val)) { syncLengthInput(); return; }
    val = Math.min(20, Math.max(0.015, val));
    applyLengthMeters(val);
    syncLengthInput();
    recomputeSpaces();
  });
  lengthInput.addEventListener("keydown", (e)=>{
    if(e.key === "Enter") lengthInput.blur();
  });

  // ---------- Dør/vindu-kontroller (type + bredde) ----------
  let openingType = "door";
  let openingWidthMM = 900;
  const openingTypeDoor = document.getElementById("openingTypeDoor");
  const openingTypeWindow = document.getElementById("openingTypeWindow");
  const openingWidthInput = document.getElementById("openingWidthInput");

  function setOpeningType(type){
    openingType = type;
    openingTypeDoor.classList.toggle("active", type === "door");
    openingTypeWindow.classList.toggle("active", type === "window");
    openingWidthMM = type === "door" ? 900 : 1200;
    openingWidthInput.value = openingWidthMM;
  }
  openingTypeDoor.addEventListener("click", ()=> setOpeningType("door"));
  openingTypeWindow.addEventListener("click", ()=> setOpeningType("window"));
  openingWidthInput.addEventListener("input", ()=>{
    const val = parseInt(openingWidthInput.value, 10);
    if(!Number.isNaN(val)) openingWidthMM = val;
  });
  openingWidthInput.addEventListener("blur", ()=>{
    let val = parseInt(openingWidthInput.value, 10);
    if(Number.isNaN(val)) val = openingWidthMM;
    val = Math.min(3000, Math.max(400, val));
    openingWidthInput.value = val;
    openingWidthMM = val;
  });

  function clampThickness(v){ return Math.min(500, Math.max(20, v)); }

  function applyThickness(val){
    if(activeTool === "draw"){
      thicknessMM = val;
      if(drawState) updatePreview(lastPointerClient.x, lastPointerClient.y);
    } else if(activeTool === "edit" && selectedWallId){
      const wallObj = interiorWalls.find(w => w.id === selectedWallId);
      if(wallObj){ wallObj.t = val/1000; renderInteriorWalls(); }
    }
  }

  thicknessInput.addEventListener("focus", ()=>{
    if(activeTool === "edit" && selectedWallId) pushUndo();
  });
  thicknessInput.addEventListener("input", ()=>{
    const val = parseInt(thicknessInput.value, 10);
    if(Number.isNaN(val)) return;
    applyThickness(val);
  });
  thicknessInput.addEventListener("blur", ()=>{
    let val = parseInt(thicknessInput.value, 10);
    if(Number.isNaN(val)) val = thicknessMM;
    val = clampThickness(val);
    thicknessInput.value = val;
    applyThickness(val);
    recomputeSpaces();
  });
  thicknessInput.addEventListener("keydown", (e)=>{
    if(e.key === "Enter") thicknessInput.blur();
  });

  // ---------- Alle vegger (ytter + inner) — ett enhetlig, redigerbart system ----------
  let interiorWalls = [
    { id:"WALL_N", x1:0,     y1:0,     x2:roomW, y2:0,     t:t },
    { id:"WALL_S", x1:0,     y1:roomH, x2:roomW, y2:roomH, t:t },
    { id:"WALL_W", x1:0,     y1:0,     x2:0,     y2:roomH, t:t },
    { id:"WALL_E", x1:roomW, y1:0,     x2:roomW, y2:roomH, t:t },
  ]; // { id, x1,y1,x2,y2 (meter), t (meter) }
  let idCounter = 1;

  function roomMetersToWorldPx(mx, my){
    return { x: originX + mx*M, y: originY + my*M };
  }
  function worldPxToRoomMeters(wx, wy){
    return { x: (wx - originX)/M, y: (wy - originY)/M };
  }

  // ---------- Snap til veggflate (start på/nær en annen vegg) ----------
  function getAllWallLinesPx(){
    return interiorWalls.map(w => {
      const p1 = roomMetersToWorldPx(w.x1, w.y1);
      const p2 = roomMetersToWorldPx(w.x2, w.y2);
      return { id:w.id, x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y, t: w.t*M };
    });
  }

  function wallLocal(line, px, py){
    const dx = line.x2-line.x1, dy = line.y2-line.y1;
    const len = Math.hypot(dx,dy) || 0.0001;
    const ux = dx/len, uy = dy/len;
    const nx = -uy, ny = ux;
    const vx = px-line.x1, vy = py-line.y1;
    return { s: vx*ux+vy*uy, p: vx*nx+vy*ny, len, ux, uy, nx, ny };
  }

  function pointOnWallFace(line, px, py){
    const loc = wallLocal(line, px, py);
    const half = line.t/2;
    return loc.s >= -half && loc.s <= loc.len+half && loc.p >= -half && loc.p <= half;
  }

  function findAnchorWallAt(px, py){
    const lines = getAllWallLinesPx();
    for(const line of lines){
      if(pointOnWallFace(line, px, py)) return line;
    }
    return null;
  }

  function rayExitPoint(line, px0, py0, dirx, diry){
    const loc = wallLocal(line, px0, py0);
    const ds = dirx*loc.ux + diry*loc.uy;
    const dp = dirx*loc.nx + diry*loc.ny;
    const half = line.t/2;
    let tExit = Infinity;
    if(Math.abs(ds) > 1e-9){
      const target = ds > 0 ? (loc.len+half) : -half;
      const cand = (target - loc.s)/ds;
      if(cand > 1e-6) tExit = Math.min(tExit, cand);
    }
    if(Math.abs(dp) > 1e-9){
      const target = dp > 0 ? half : -half;
      const cand = (target - loc.p)/dp;
      if(cand > 1e-6) tExit = Math.min(tExit, cand);
    }
    if(!isFinite(tExit)) return null;
    return { x: px0 + dirx*tExit, y: py0 + diry*tExit };
  }

  // Finner t-verdien der en stråle (ox,oy)+t*(dirx,diry) FØRST går inn i veggens footprint.
  function raySlabEntry(line, ox, oy, dirx, diry){
    const loc = wallLocal(line, ox, oy);
    const ds = dirx*loc.ux + diry*loc.uy;
    const dp = dirx*loc.nx + diry*loc.ny;
    const half = line.t/2;
    let tMin = -Infinity, tMax = Infinity;
    if(Math.abs(ds) < 1e-9){
      if(loc.s < -half || loc.s > loc.len+half) return null;
    } else {
      let t1 = (-half - loc.s)/ds, t2 = (loc.len+half - loc.s)/ds;
      if(t1 > t2){ const tmp=t1; t1=t2; t2=tmp; }
      tMin = Math.max(tMin, t1); tMax = Math.min(tMax, t2);
    }
    if(Math.abs(dp) < 1e-9){
      if(loc.p < -half || loc.p > half) return null;
    } else {
      let t1 = (-half - loc.p)/dp, t2 = (half - loc.p)/dp;
      if(t1 > t2){ const tmp=t1; t1=t2; t2=tmp; }
      tMin = Math.max(tMin, t1); tMax = Math.min(tMax, t2);
    }
    if(tMin > tMax) return null;
    return { tEntry: tMin, tExit: tMax };
  }

  function normalizeVec(dx, dy){
    const len = Math.hypot(dx,dy) || 0.0001;
    return { x: dx/len, y: dy/len };
  }

  // Finner alle andre vegger som har et endepunkt festet til veggen med id wallId,
  // basert på veggens NÅVÆRENDE footprint (kalles ved start av et drag).
  function findAttachedWalls(wallId){
    const w = interiorWalls.find(x => x.id === wallId);
    if(!w) return [];
    const p1 = roomMetersToWorldPx(w.x1, w.y1);
    const p2 = roomMetersToWorldPx(w.x2, w.y2);
    const line = { x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y, t:w.t*M };
    const deps = [];
    interiorWalls.forEach(d => {
      if(d.id === wallId) return;
      const dp1 = roomMetersToWorldPx(d.x1, d.y1);
      const dp2 = roomMetersToWorldPx(d.x2, d.y2);
      if(pointOnWallFace(line, dp1.x, dp1.y)){
        deps.push({ id:d.id, end:"1", farPx:dp2, dir:normalizeVec(dp1.x-dp2.x, dp1.y-dp2.y) });
      }
      if(pointOnWallFace(line, dp2.x, dp2.y)){
        deps.push({ id:d.id, end:"2", farPx:dp1, dir:normalizeVec(dp2.x-dp1.x, dp2.y-dp1.y) });
      }
    });
    return deps;
  }

  // Følger tilknyttede vegger etter at ankerveggen (wallId) har fått ny geometri:
  // strekker/korter dem inn slik at de fortsatt møter ankerveggens (nye) flate.
  function propagateAttached(wallId, deps){
    if(!deps.length) return;
    const w = interiorWalls.find(x => x.id === wallId);
    if(!w) return;
    const p1 = roomMetersToWorldPx(w.x1, w.y1);
    const p2 = roomMetersToWorldPx(w.x2, w.y2);
    const line = { x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y, t:w.t*M };
    deps.forEach(dep => {
      const hit = raySlabEntry(line, dep.farPx.x, dep.farPx.y, dep.dir.x, dep.dir.y);
      if(!hit || hit.tExit < 0) return;
      const tt = Math.max(hit.tEntry, 0);
      const px = dep.farPx.x + dep.dir.x*tt;
      const py = dep.farPx.y + dep.dir.y*tt;
      const m = worldPxToRoomMeters(px, py);
      const dWall = interiorWalls.find(x => x.id === dep.id);
      if(!dWall) return;
      if(dep.end === "1"){ dWall.x1 = snap5(m.x); dWall.y1 = snap5(m.y); }
      else { dWall.x2 = snap5(m.x); dWall.y2 = snap5(m.y); }
      updateWallGeometryDom(dep.id);
    });
  }

  function wallPolygonPoints(p1, p2, thicknessPx){
    const dxp = p2.x - p1.x, dyp = p2.y - p1.y;
    const len = Math.hypot(dxp, dyp) || 0.0001;
    const ux = dxp/len, uy = dyp/len;
    const nx = -uy, ny = ux;
    const ext = thicknessPx/2;
    const a = { x: p1.x - ux*ext, y: p1.y - uy*ext };
    const b = { x: p2.x + ux*ext, y: p2.y + uy*ext };
    const p = [
      { x: a.x + nx*thicknessPx/2, y: a.y + ny*thicknessPx/2 },
      { x: b.x + nx*thicknessPx/2, y: b.y + ny*thicknessPx/2 },
      { x: b.x - nx*thicknessPx/2, y: b.y - ny*thicknessPx/2 },
      { x: a.x - nx*thicknessPx/2, y: a.y - ny*thicknessPx/2 },
    ];
    return p.map(pt => `${pt.x.toFixed(1)},${pt.y.toFixed(1)}`).join(" ");
  }

  function makeWallShape(wallData, opts){
    const p1 = roomMetersToWorldPx(wallData.x1, wallData.y1);
    const p2 = roomMetersToWorldPx(wallData.x2, wallData.y2);
    const thicknessPx = wallData.t * M;
    const pts = wallPolygonPoints(p1, p2, thicknessPx);
    const attrs = Object.assign({ points: pts, class: "interior-wall", "data-id": wallData.id }, opts);
    return el("polygon", attrs);
  }

  let hoveredWallId = null;

  function updateHighlight(){
    while(highlightLayer.firstChild) highlightLayer.removeChild(highlightLayer.firstChild);
    let target = null, color = null;
    if(activeTool === "erase" && hoveredWallId){
      target = interiorWalls.find(w => w.id === hoveredWallId);
      color = "var(--danger)";
    } else if(activeTool === "edit" && selectedWallId){
      target = interiorWalls.find(w => w.id === selectedWallId);
      color = "var(--accent)";
    } else if(activeTool === "edit" && hoveredWallId){
      target = interiorWalls.find(w => w.id === hoveredWallId);
      color = "var(--accent)";
    }
    if(target){
      const shape = makeWallShape(target, { fill:"none", stroke:color, "stroke-width":"2", "vector-effect":"non-scaling-stroke", "pointer-events":"none" });
      highlightLayer.appendChild(shape);
    }
  }

  // Oppdaterer punktene til en vegg direkte i DOM (uten å fjerne/gjenskape elementene) —
  // avgjørende under et drag, siden pointer capture ryker hvis elementet byttes ut underveis.
  function updateWallGeometryDom(wallId){
    const w = interiorWalls.find(x => x.id === wallId);
    if(!w) return;
    const pts = wallPolygonPoints(roomMetersToWorldPx(w.x1,w.y1), roomMetersToWorldPx(w.x2,w.y2), w.t*M);
    [draftStrokes, draftFills, polishStrokes, polishFills].forEach(g => {
      const shape = g.querySelector('[data-id="'+wallId+'"]');
      if(shape) shape.setAttribute("points", pts);
    });
  }

  function renderEditHandles(){
    while(editHandles.firstChild) editHandles.removeChild(editHandles.firstChild);
    if(activeTool !== "edit" || !selectedWallId) return;
    const w = interiorWalls.find(x => x.id === selectedWallId);
    if(!w) return;
    const p1 = roomMetersToWorldPx(w.x1, w.y1);
    const p2 = roomMetersToWorldPx(w.x2, w.y2);
    [{ p:p1, which:"1" }, { p:p2, which:"2" }].forEach(h => {
      const c = el("circle", { cx:h.p.x, cy:h.p.y, r:"6", class:"edit-handle" });
      attachHandleDrag(c, w, h.which);
      editHandles.appendChild(c);
    });
  }

  // Deles av mål-verktøyet og håndtak-drag: retter opp NESTEN vannrette/loddrette
  // punkter til nøyaktig 0°/90° i forhold til et referansepunkt (px), uten å røre ekte diagonaler.
  function snapAlmostAxis(candPx, refPx, tolerancePx){
    const ddx = candPx.x - refPx.x, ddy = candPx.y - refPx.y;
    if(Math.abs(ddy) <= tolerancePx && Math.abs(ddx) > tolerancePx) return { x:candPx.x, y:refPx.y };
    if(Math.abs(ddx) <= tolerancePx && Math.abs(ddy) > tolerancePx) return { x:refPx.x, y:candPx.y };
    return candPx;
  }

  function attachHandleDrag(circleEl, wallData, which){
    circleEl.addEventListener("pointerdown", (e)=>{
      e.stopPropagation();
      circleEl.setPointerCapture(e.pointerId);
      pushUndo();
      const deps = findAttachedWalls(wallData.id);

      const onMove = (ev)=>{
        const w2 = toWorldPoint(ev.clientX, ev.clientY);
        const m = worldPxToRoomMeters(w2.x, w2.y);
        let sx = snap5(m.x), sy = snap5(m.y);

        // Nesten vannrett/loddrett i forhold til den andre (faste) enden? Rett opp til nøyaktig 0°/90°,
        // slik at veggen ikke får en umerkelig skjevhet av grid-avrunding i bare den ene enden.
        if(snapEnabled){
          const otherX = which === "1" ? wallData.x2 : wallData.x1;
          const otherY = which === "1" ? wallData.y2 : wallData.y1;
          const otherPx = roomMetersToWorldPx(otherX, otherY);
          const candPx = roomMetersToWorldPx(sx, sy);
          const fixedPx = snapAlmostAxis(candPx, otherPx, 9);
          const fixedM = worldPxToRoomMeters(fixedPx.x, fixedPx.y);
          sx = fixedM.x; sy = fixedM.y;
        }

        if(which === "1"){ wallData.x1 = sx; wallData.y1 = sy; }
        else { wallData.x2 = sx; wallData.y2 = sy; }
        const snappedPx = roomMetersToWorldPx(sx, sy);
        circleEl.setAttribute("cx", snappedPx.x);
        circleEl.setAttribute("cy", snappedPx.y);
        updateWallGeometryDom(wallData.id);
        propagateAttached(wallData.id, deps);
        renderOpenings();
        updateHighlight();
        syncLengthInput();
      };
      const onUp = (ev)=>{
        circleEl.releasePointerCapture(ev.pointerId);
        circleEl.removeEventListener("pointermove", onMove);
        circleEl.removeEventListener("pointerup", onUp);
        recomputeSpaces();
      };
      circleEl.addEventListener("pointermove", onMove);
      circleEl.addEventListener("pointerup", onUp);
    });
  }

  // Finner nærmeste tilnærmet parallelle vegg på hver side av wallData
  // (brukes til å vise avstand til "sideveggene" mens man flytter en vegg).
  function findFlankingWalls(wallData){
    const dx = wallData.x2-wallData.x1, dy = wallData.y2-wallData.y1;
    const len = Math.hypot(dx,dy) || 0.0001;
    const ux = dx/len, uy = dy/len, nx = -uy, ny = ux;
    let pos = null, neg = null;
    interiorWalls.forEach(w => {
      if(w.id === wallData.id) return;
      const wdx = w.x2-w.x1, wdy = w.y2-w.y1, wlen = Math.hypot(wdx,wdy) || 0.0001;
      const wux = wdx/wlen, wuy = wdy/wlen;
      if(Math.abs(ux*wuy - uy*wux) > 0.12) return; // ikke tilnærmet parallell (~7°)

      const offset = (w.x1-wallData.x1)*nx + (w.y1-wallData.y1)*ny;

      // Krev litt overlapp langs veggens egen lengdeakse — ellers er det ikke en reell "sidevegg"
      const s1 = (w.x1-wallData.x1)*ux + (w.y1-wallData.y1)*uy;
      const s2 = (w.x2-wallData.x1)*ux + (w.y2-wallData.y1)*uy;
      const lo = Math.min(s1,s2), hi = Math.max(s1,s2);
      if(Math.min(hi,len) - Math.max(lo,0) < len*0.15) return;

      if(offset >= 0){ if(!pos || offset < pos.offset) pos = { wall:w, offset }; }
      else { if(!neg || offset > neg.offset) neg = { wall:w, offset }; }
    });
    return { pos, neg, ux, uy, nx, ny, len };
  }

  // Viser midlertidige mållinjer til begge sideveggene mens man flytter wallData
  // (samme visuelle språk/lag som "midlertidige mål ved plassering av dør/vindu").
  function renderWallMovePreviewDims(wallData){
    while(openingPreviewLayer.firstChild) openingPreviewLayer.removeChild(openingPreviewLayer.firstChild);
    const f = findFlankingWalls(wallData);
    const drawSide = (side, alongFrac) => {
      if(!side) return;
      const sign = Math.sign(side.offset) || 1;
      const px = wallData.x1 + f.ux*(f.len*alongFrac), py = wallData.y1 + f.uy*(f.len*alongFrac);
      const qx = px + f.nx*side.offset, qy = py + f.ny*side.offset;
      // Trekk inn fra senterlinje til nærmeste flate på begge vegger — netto klaring, ikke senter-til-senter.
      const nearX = px + f.nx*sign*(wallData.t/2), nearY = py + f.ny*sign*(wallData.t/2);
      const farX  = qx - f.nx*sign*(side.wall.t/2), farY  = qy - f.ny*sign*(side.wall.t/2);
      const distM = Math.max(0, Math.abs(side.offset) - wallData.t/2 - side.wall.t/2);
      const p1 = roomMetersToWorldPx(nearX, nearY);
      const p2 = roomMetersToWorldPx(farX, farY);
      const grp = buildDimensionGroup(p1, p2, 0, distM, false, null);
      openingPreviewLayer.appendChild(grp);
    };
    drawSide(f.pos, 0.33);
    drawSide(f.neg, 0.66);
  }

  function attachInteractionHandlers(fillEl, wallData){
    fillEl.addEventListener("pointerdown", (e)=>{
      if(activeTool === "pan"){
        e.stopPropagation();
        selectedObject = { type:"wall", id: wallData.id };
        renderSelectionRing();
        return;
      }
      if(activeTool === "erase"){
        e.stopPropagation();
        pushUndo();
        interiorWalls = interiorWalls.filter(w => w.id !== wallData.id);
        openings = openings.filter(o => o.wallId !== wallData.id);
        if(selectedWallId === wallData.id) selectedWallId = null;
        if(hoveredWallId === wallData.id) hoveredWallId = null;
        renderInteriorWalls();
        recomputeSpaces();
        return;
      }
      if(activeTool === "edit"){
        e.stopPropagation();
        selectedWallId = wallData.id;
        const mm = Math.round(wallData.t * 1000);
        thicknessInput.value = mm;
        thicknessControl.style.display = "flex";
        lengthDivider.style.display = "block";
        lengthInput.style.display = "inline-block";
        lengthUnit.style.display = "inline";
        syncLengthInput();
        updateHighlight();
        renderEditHandles();

        // Potensielt kroppsdrag: flytt hele veggen uten å endre lengde/vinkel.
        // Vi unngår full renderInteriorWalls() her — den ville fjernet fillEl
        // midt i draget og ødelagt pointer capture.
        const startClient = { x:e.clientX, y:e.clientY };
        const startWorld = toWorldPoint(e.clientX, e.clientY);
        const orig = { x1:wallData.x1, y1:wallData.y1, x2:wallData.x2, y2:wallData.y2 };
        let moved = false;
        let deps = null;
        fillEl.setPointerCapture(e.pointerId);

        const onMove = (ev)=>{
          const cur = toWorldPoint(ev.clientX, ev.clientY);
          const dxPx = cur.x - startWorld.x, dyPx = cur.y - startWorld.y;
          if(!moved){
            if(Math.hypot(ev.clientX-startClient.x, ev.clientY-startClient.y) < 3) return;
            moved = true;
            pushUndo();
            deps = findAttachedWalls(wallData.id);
          }
          const dxM = dxPx/M, dyM = dyPx/M;
          wallData.x1 = snap5(orig.x1+dxM); wallData.y1 = snap5(orig.y1+dyM);
          wallData.x2 = snap5(orig.x2+dxM); wallData.y2 = snap5(orig.y2+dyM);
          updateWallGeometryDom(wallData.id);
          if(deps) propagateAttached(wallData.id, deps);
          renderOpenings();
          updateHighlight();
          renderEditHandles();
          renderWallMovePreviewDims(wallData);
        };
        const onUp = (ev)=>{
          fillEl.releasePointerCapture(ev.pointerId);
          fillEl.removeEventListener("pointermove", onMove);
          fillEl.removeEventListener("pointerup", onUp);
          if(moved) recomputeSpaces();
          while(openingPreviewLayer.firstChild) openingPreviewLayer.removeChild(openingPreviewLayer.firstChild);
          renderInteriorWalls();
        };
        fillEl.addEventListener("pointermove", onMove);
        fillEl.addEventListener("pointerup", onUp);
        return;
      }
    });
    fillEl.addEventListener("pointerenter", ()=>{
      if(activeTool === "erase" || activeTool === "edit"){
        hoveredWallId = wallData.id;
        updateHighlight();
      }
    });
    fillEl.addEventListener("pointerleave", ()=>{
      if(hoveredWallId === wallData.id){
        hoveredWallId = null;
        updateHighlight();
      }
    });
  }

  function renderInteriorWalls(){
    [draftStrokes, draftFills, polishStrokes, polishFills].forEach(g =>
      g.querySelectorAll(".interior-wall").forEach(n => n.remove())
    );

    interiorWalls.forEach(w => {
      const ds = makeWallShape(w, { fill:"none", stroke:"var(--line)", "stroke-width":"1.1", "vector-effect":"non-scaling-stroke" });
      const df = makeWallShape(w, { fill:"var(--wall-drafting)" });
      const ps = makeWallShape(w, { fill:"none", stroke:"rgba(10,11,13,0.6)", "stroke-width":"0.6", "vector-effect":"non-scaling-stroke" });
      const pf = makeWallShape(w, { fill:"url(#wallGrad)" });
      attachInteractionHandlers(df, w);
      attachInteractionHandlers(pf, w);
      draftStrokes.appendChild(ds);
      draftFills.appendChild(df);
      polishStrokes.appendChild(ps);
      polishFills.appendChild(pf);
    });

    if(previewWall){
      const df = makeWallShape(previewWall, { fill:"var(--wall-drafting)", stroke:"var(--line)", "stroke-width":"1.1", "vector-effect":"non-scaling-stroke", "stroke-dasharray":"3 3", class:"interior-wall wall-preview" });
      const pf = makeWallShape(previewWall, { fill:"url(#wallGrad)", stroke:"rgba(10,11,13,0.6)", "stroke-width":"0.6", "vector-effect":"non-scaling-stroke", class:"interior-wall wall-preview" });
      draftFills.appendChild(df);
      polishFills.appendChild(pf);
    }

    updateHighlight();
    renderEditHandles();
    renderOpenings();
  }

  // ---------- Dører og vinduer ----------
  let openings = []; // { id, wallId, s (meter langs veggen fra x1,y1), width (meter), type:'door'|'window', flip }
  let openingPreview = null; // { wallId, sPx, wPx, lenPx } — midlertidig, mens man plasserer
  let openingIdCounter = 1;

  function wallGeometryPx(w){
    const p1 = roomMetersToWorldPx(w.x1, w.y1);
    const p2 = roomMetersToWorldPx(w.x2, w.y2);
    const dx = p2.x-p1.x, dy = p2.y-p1.y;
    const len = Math.hypot(dx,dy) || 0.0001;
    const ux = dx/len, uy = dy/len;
    const nx = -uy, ny = ux;
    return { p1, p2, ux, uy, nx, ny, lenPx: len, t: w.t*M };
  }

  let selectedOpeningId = null;
  const openingEditOverlay = document.getElementById("openingEditOverlay");
  const btnHingeSide = document.getElementById("btnHingeSide");
  const btnSwingSide = document.getElementById("btnSwingSide");
  const btnDeleteOpening = document.getElementById("btnDeleteOpening");
  const openingWidthEdit = document.getElementById("openingWidthEdit");

  openingWidthEdit.addEventListener("focus", ()=>{ pushUndo(); });
  openingWidthEdit.addEventListener("keydown", (e)=>{ if(e.key === "Enter") openingWidthEdit.blur(); });
  openingWidthEdit.addEventListener("blur", ()=>{
    const op = openings.find(o => o.id === selectedOpeningId);
    if(!op) return;
    let newW = parseInt(openingWidthEdit.value, 10);
    if(Number.isNaN(newW)) { openingWidthEdit.value = Math.round(op.width*1000); return; }
    newW = Math.min(5000, Math.max(200, newW));
    const newWM = newW/1000;
    // Sjekk klaring
    const wallObj = interiorWalls.find(x => x.id === op.wallId);
    if(wallObj){
      const p1 = roomMetersToWorldPx(wallObj.x1, wallObj.y1);
      const p2 = roomMetersToWorldPx(wallObj.x2, wallObj.y2);
      const dx = p2.x-p1.x, dy = p2.y-p1.y;
      const lenPx = Math.hypot(dx,dy);
      const sPx = op.s*M;
      const wPx = newWM*M;
      const clearPx = OPENING_MIN_CLEARANCE*M;
      if(wPx/2 + clearPx > sPx || sPx + wPx/2 + clearPx > lenPx){
        showSpaceHint(vb.w/2, vb.h/2, "NOT ENOUGH ROOM FOR " + newW + " MM");
        openingWidthEdit.value = Math.round(op.width*1000);
        return;
      }
    }
    op.width = newWM;
    renderOpenings();
    updateOpeningEditOverlay();
  });

  btnHingeSide.addEventListener("click", ()=>{
    const op = openings.find(o => o.id === selectedOpeningId);
    if(!op) return;
    pushUndo();
    toggleHingeSide(op);
    renderOpenings();
  });
  btnSwingSide.addEventListener("click", ()=>{
    const op = openings.find(o => o.id === selectedOpeningId);
    if(!op) return;
    pushUndo();
    toggleSwingSide(op);
    renderOpenings();
  });
  btnDeleteOpening.addEventListener("click", ()=>{
    if(!selectedOpeningId) return;
    pushUndo();
    openings = openings.filter(o => o.id !== selectedOpeningId);
    selectedOpeningId = null;
    renderOpenings();
  });

  function toggleHingeSide(op){
    op.hingeEnd = (op.hingeEnd === "1") ? "2" : "1";
  }
  function toggleSwingSide(op){
    op.flip = !op.flip;
  }

  function attachOpeningHandlers(grp, op){
    grp.addEventListener("pointerdown", (e)=>{
      if(activeTool === "erase"){
        e.stopPropagation();
        pushUndo();
        openings = openings.filter(o => o.id !== op.id);
        if(selectedOpeningId === op.id) selectedOpeningId = null;
        renderOpenings();
        return;
      }
      if(activeTool === "opening"){
        e.stopPropagation();
        selectedOpeningId = (selectedOpeningId === op.id) ? null : op.id;
        renderOpenings();

        // Drag langs veggen for å flytte åpningen
        const startClient = { x:e.clientX, y:e.clientY };
        let moved = false;
        grp.setPointerCapture(e.pointerId);
        grp.style.cursor = "grabbing";

        const onMove = (ev)=>{
          if(!moved && Math.hypot(ev.clientX-startClient.x, ev.clientY-startClient.y) < 4) return;
          moved = true;
          const wallObj = interiorWalls.find(x => x.id === op.wallId);
          if(!wallObj) return;
          const p1 = roomMetersToWorldPx(wallObj.x1, wallObj.y1);
          const p2 = roomMetersToWorldPx(wallObj.x2, wallObj.y2);
          const dx = p2.x-p1.x, dy = p2.y-p1.y;
          const lenPx = Math.hypot(dx,dy)||0.0001;
          const ux = dx/lenPx, uy = dy/lenPx;
          const w2 = toWorldPoint(ev.clientX, ev.clientY);
          const vx = w2.x-p1.x, vy = w2.y-p1.y;
          const sPx = vx*ux + vy*uy;
          const wPx = op.width*M;
          const clearPx = OPENING_MIN_CLEARANCE*M;
          const clampedS = Math.min(Math.max(sPx, wPx/2+clearPx), lenPx-wPx/2-clearPx);
          op.s = snap5(clampedS/M);
          renderOpenings();
          updateOpeningEditOverlay();
          // Vis midlertidige mål som ved ny plassering
          const previewInfo = { wallId: op.wallId, sPx: clampedS, wPx, lenPx };
          renderOpeningPreviewDims(previewInfo);
        };
        const onUp = ()=>{
          grp.style.cursor = "";
          grp.releasePointerCapture(e.pointerId);
          grp.removeEventListener("pointermove", onMove);
          grp.removeEventListener("pointerup", onUp);
          while(openingPreviewLayer.firstChild) openingPreviewLayer.removeChild(openingPreviewLayer.firstChild);
          if(moved) recomputeSpaces();
        };
        grp.addEventListener("pointermove", onMove);
        grp.addEventListener("pointerup", onUp);
        return;
      }
    });
  }

  function updateOpeningEditOverlay(){
    const op = openings.find(o => o.id === selectedOpeningId);
    if(!op){
      openingEditOverlay.style.display = "none";
      return;
    }
    const w = interiorWalls.find(x => x.id === op.wallId);
    if(!w){
      openingEditOverlay.style.display = "none";
      return;
    }
    const g = wallGeometryPx(w);
    const sPx = op.s*M;
    const midX = g.p1.x + g.ux*sPx, midY = g.p1.y + g.uy*sPx;
    const labelX = midX + g.nx*(g.t/2 + 24), labelY = midY + g.ny*(g.t/2 + 24);
    const client = worldToClient(labelX, labelY);
    openingEditOverlay.style.left = client.x + "px";
    openingEditOverlay.style.top = client.y + "px";
    openingEditOverlay.style.display = "flex";
    btnHingeSide.style.display = op.type === "door" ? "flex" : "none";
    btnSwingSide.style.display = op.type === "door" ? "flex" : "none";
    openingWidthEdit.value = Math.round(op.width * 1000);
    requestAnimationFrame(()=>{ openingWidthEdit.focus(); openingWidthEdit.select(); });
  }

  function renderOpenings(){
    while(openingsLayer.firstChild) openingsLayer.removeChild(openingsLayer.firstChild);
    openings.forEach(op => {
      const w = interiorWalls.find(x => x.id === op.wallId);
      if(!w) return;
      const g = wallGeometryPx(w);
      const wPx = op.width*M;
      let sPx = op.s*M;
      sPx = Math.min(Math.max(sPx, wPx/2), Math.max(g.lenPx - wPx/2, wPx/2));
      const half = g.t/2;

      const aX = g.p1.x + g.ux*(sPx - wPx/2), aY = g.p1.y + g.uy*(sPx - wPx/2);
      const bX = g.p1.x + g.ux*(sPx + wPx/2), bY = g.p1.y + g.uy*(sPx + wPx/2);

      const isSelected = op.id === selectedOpeningId;
      const grp = el("g", { class:"opening-group" + (isSelected ? " selected" : ""), "data-id": op.id });

      const cutPts = [
        { x:aX+g.nx*half, y:aY+g.ny*half },
        { x:bX+g.nx*half, y:bY+g.ny*half },
        { x:bX-g.nx*half, y:bY-g.ny*half },
        { x:aX-g.nx*half, y:aY-g.ny*half },
      ].map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
      grp.appendChild(el("polygon", { points:cutPts, class:"opening-cut" }));

      [{x:aX,y:aY}, {x:bX,y:bY}].forEach(pt => {
        grp.appendChild(el("line", {
          x1:pt.x+g.nx*half, y1:pt.y+g.ny*half,
          x2:pt.x-g.nx*half, y2:pt.y-g.ny*half,
          class:"opening-jamb"
        }));
      });

      if(op.type === "door"){
        const atB = op.hingeEnd === "2";
        const hinge = atB ? { x:bX, y:bY } : { x:aX, y:aY };
        const otherJamb = atB ? { x:aX, y:aY } : { x:bX, y:bY };
        const sign = op.flip ? -1 : 1;
        const leafTip = { x: hinge.x + g.nx*sign*wPx, y: hinge.y + g.ny*sign*wPx };
        grp.appendChild(el("line", { x1:hinge.x, y1:hinge.y, x2:leafTip.x, y2:leafTip.y, class:"opening-leaf" }));
        const cross = (otherJamb.x-hinge.x)*(leafTip.y-hinge.y) - (otherJamb.y-hinge.y)*(leafTip.x-hinge.x);
        const sweep = cross > 0 ? 1 : 0;
        const arcPath = `M ${otherJamb.x.toFixed(1)},${otherJamb.y.toFixed(1)} A ${wPx.toFixed(1)},${wPx.toFixed(1)} 0 0,${sweep} ${leafTip.x.toFixed(1)},${leafTip.y.toFixed(1)}`;
        grp.appendChild(el("path", { d:arcPath, class:"opening-arc" }));
      } else {
        [-1, 1].forEach(side => {
          const off = half*0.35*side;
          grp.appendChild(el("line", {
            x1:aX+g.nx*off, y1:aY+g.ny*off,
            x2:bX+g.nx*off, y2:bY+g.ny*off,
            class:"opening-pane"
          }));
        });
      }

      attachOpeningHandlers(grp, op);
      attachPanSelectToOpening(grp, op);
      openingsLayer.appendChild(grp);
    });
    updateOpeningEditOverlay();
    renderSelectionRing();
  }

  const OPENING_MIN_CLEARANCE = 0.1; // meter — min. avstand til veggende/annen vegg

  // Finner alle "skjøtepunkter" langs en vegg (px, langs veggens egen lengde):
  // veggens egne to ender, pluss der andre vegger er festet til den (T-skjøter).
  function getJunctionsAlongWall(wallId){
    const w = interiorWalls.find(x => x.id === wallId);
    if(!w) return [];
    const g = wallGeometryPx(w);
    const line = { x1:g.p1.x, y1:g.p1.y, x2:g.p2.x, y2:g.p2.y, t:w.t*M };
    const junctions = [0, g.lenPx];
    interiorWalls.forEach(d => {
      if(d.id === wallId) return;
      [roomMetersToWorldPx(d.x1, d.y1), roomMetersToWorldPx(d.x2, d.y2)].forEach(pt => {
        if(pointOnWallFace(line, pt.x, pt.y)){
          const loc = wallLocal(line, pt.x, pt.y);
          junctions.push(Math.min(Math.max(loc.s, 0), g.lenPx));
        }
      });
    });
    return junctions;
  }

  function openingClearanceOk(sPx, wPx, junctions, clearancePx){
    const left = sPx - wPx/2, right = sPx + wPx/2;
    const eps = 0.5; // liten toleranse for avrunding
    return junctions.every(j => j <= left - clearancePx + eps || j >= right + clearancePx - eps);
  }

  function computeOpeningPreview(clientX, clientY){
    const w = toWorldPoint(clientX, clientY);
    const line = findAnchorWallAt(w.x, w.y);
    if(!line) return null;
    const wallObj = interiorWalls.find(x => x.id === line.id);
    if(!wallObj) return null;
    const loc = wallLocal(line, w.x, w.y);
    const wPx = openingWidthMM/1000*M;
    const clearancePx = OPENING_MIN_CLEARANCE*M;
    if(loc.len < wPx + 2*clearancePx) return null;
    const sPx = Math.min(Math.max(loc.s, wPx/2+clearancePx), loc.len - wPx/2 - clearancePx);
    return { wallId: line.id, sPx, wPx, lenPx: loc.len };
  }

  function renderOpeningPreview(){
    while(openingPreviewLayer.firstChild) openingPreviewLayer.removeChild(openingPreviewLayer.firstChild);
    if(!openingPreview) return;
    renderOpeningPreviewDims(openingPreview);
    const w = interiorWalls.find(x => x.id === openingPreview.wallId);
    if(!w) return;
    const g = wallGeometryPx(w);
    const { sPx, wPx } = openingPreview;
    const half = g.t/2;
    const nearX = g.p1.x + g.ux*(sPx-wPx/2), nearY = g.p1.y + g.uy*(sPx-wPx/2);
    const farX = g.p1.x + g.ux*(sPx+wPx/2), farY = g.p1.y + g.uy*(sPx+wPx/2);
    const cutPts = [
      { x:nearX+g.nx*half, y:nearY+g.ny*half }, { x:farX+g.nx*half, y:farY+g.ny*half },
      { x:farX-g.nx*half, y:farY-g.ny*half }, { x:nearX-g.nx*half, y:nearY-g.ny*half },
    ].map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
    openingPreviewLayer.appendChild(el("polygon", { points:cutPts, class:"opening-cut-preview" }));
  }

  function renderOpeningPreviewDims(preview){
    while(openingPreviewLayer.firstChild) openingPreviewLayer.removeChild(openingPreviewLayer.firstChild);
    if(!preview) return;
    const w = interiorWalls.find(x => x.id === preview.wallId);
    if(!w) return;
    const g = wallGeometryPx(w);
    const { sPx, wPx } = preview;
    const half = g.t/2;
    const nearX = g.p1.x + g.ux*(sPx-wPx/2), nearY = g.p1.y + g.uy*(sPx-wPx/2);
    const farX = g.p1.x + g.ux*(sPx+wPx/2), farY = g.p1.y + g.uy*(sPx+wPx/2);
    const offsetPx = half + 22;
    const d1 = buildDimensionGroup(g.p1, { x:nearX, y:nearY }, offsetPx, (sPx-wPx/2)/M, false, null);
    const d2 = buildDimensionGroup({ x:farX, y:farY }, g.p2, offsetPx, (g.lenPx-(sPx+wPx/2))/M, false, null);
    openingPreviewLayer.appendChild(d1);
    openingPreviewLayer.appendChild(d2);
  }

  function tryCreateOpeningAt(clientX, clientY){
    const w = toWorldPoint(clientX, clientY);
    const preview = computeOpeningPreview(clientX, clientY);
    if(!preview){
      const line = findAnchorWallAt(w.x, w.y);
      showSpaceHint(w.x, w.y, line ? "WALL TOO SHORT" : "CLICK ON A WALL");
      return;
    }
    const { wallId, sPx, wPx } = preview;
    const clearancePx = OPENING_MIN_CLEARANCE*M;
    const junctions = getJunctionsAlongWall(wallId);
    if(!openingClearanceOk(sPx, wPx, junctions, clearancePx)){
      showSpaceHint(w.x, w.y, "TOO CLOSE TO A CORNER OR WALL");
      return;
    }
    pushUndo();
    openings.push({
      id: "op-" + (openingIdCounter++),
      wallId: wallId,
      s: snap5(sPx/M),
      width: openingWidthMM/1000,
      type: openingType,
      hingeEnd: "1",
      flip: false
    });
    renderOpenings();
  }

  // ---------- Mål (målsettingslinjer) ----------
  let dimensions = []; // { id, x1,y1,x2,y2 (meter), offset (meter, signert) }
  let dimIdCounter = 1;
  let dimState = null; // { p1:{x,y}, p2:{x,y}|null, phase:'p2'|'offset' }

  // Hvis punktet er NESTEN vannrett/loddrett fra forrige punkt (innenfor noen få piksler),
  // rettes det opp til nøyaktig 90°. Er avviket større, tolkes det som en ekte diagonal.
  function applyAngleCleanup(m, fromM){
    if(!fromM || !snapEnabled) return m;
    const p1 = roomMetersToWorldPx(fromM.x, fromM.y);
    const p2 = roomMetersToWorldPx(m.x, m.y);
    const fixed = snapAlmostAxis(p2, p1, 9);
    return worldPxToRoomMeters(fixed.x, fixed.y);
  }

  function measureSnapPoint(clientX, clientY, fromM){
    const w = toWorldPoint(clientX, clientY);

    // Hjørne sjekkes med rå pekerposisjon — skal fortsatt kunne måles diagonalt (f.eks. romdiagonaler).
    const vertex = findNearbyVertex(w.x, w.y, VERTEX_SNAP_PX);
    if(vertex) return applyAngleCleanup(worldPxToRoomMeters(vertex.x, vertex.y), fromM);

    // Kant: lås til vannrett/loddrett fra forrige punkt FØR vi leter etter kanten.
    // Kant-til-kant-mål (f.eks. avstand mellom to parallelle vegger) skal nesten alltid være 90°.
    let candX = w.x, candY = w.y;
    if(fromM && snapEnabled){
      const fromPx = roomMetersToWorldPx(fromM.x, fromM.y);
      const ddx = w.x - fromPx.x, ddy = w.y - fromPx.y;
      if(Math.abs(ddx) >= Math.abs(ddy)) candY = fromPx.y; else candX = fromPx.x;
    }
    const edge = findEdgeSnap(candX, candY, EDGE_SNAP_PX);
    if(edge) return applyAngleCleanup(worldPxToRoomMeters(edge.x, edge.y), fromM);

    // Verken hjørne eller kant: vanlig rutenett-snap, låst til forrige punkts akse.
    let m = worldPxToRoomMeters(w.x, w.y);
    m = { x: snap5(m.x), y: snap5(m.y) };
    if(fromM && snapEnabled){
      let dx = m.x - fromM.x, dy = m.y - fromM.y;
      if(Math.abs(dx) >= Math.abs(dy)) dy = 0; else dx = 0;
      m = { x: fromM.x + dx, y: fromM.y + dy };
    }
    return applyAngleCleanup(m, fromM);
  }

  function dimGeometryPx(d){
    const p1 = roomMetersToWorldPx(d.x1, d.y1);
    const p2 = roomMetersToWorldPx(d.x2, d.y2);
    const dx = p2.x-p1.x, dy = p2.y-p1.y;
    const len = Math.hypot(dx,dy) || 0.0001;
    const ux = dx/len, uy = dy/len;
    const nx = -uy, ny = ux;
    return { p1, p2, ux, uy, nx, ny, lenPx: len };
  }

  function buildDimensionGroup(p1, p2, offsetPx, lenM, interactive, dimData){
    const dx = p2.x-p1.x, dy = p2.y-p1.y;
    const len = Math.hypot(dx,dy) || 0.0001;
    const ux = dx/len, uy = dy/len;
    let nx = -uy, ny = ux;
    let off = offsetPx;
    if(Math.abs(off) < 15) off = off < 0 ? -15 : 15;

    const d1 = { x: p1.x + nx*off, y: p1.y + ny*off };
    const d2 = { x: p2.x + nx*off, y: p2.y + ny*off };
    const overshoot = Math.sign(off) * 5;
    const e1 = { x: p1.x + nx*(off+overshoot), y: p1.y + ny*(off+overshoot) };
    const e2 = { x: p2.x + nx*(off+overshoot), y: p2.y + ny*(off+overshoot) };

    const g = el("g", { class:"measure-group" + (dimData ? "" : " wall-preview") });
    g.appendChild(el("line", { class:"measure-ext", x1:p1.x, y1:p1.y, x2:e1.x, y2:e1.y }));
    g.appendChild(el("line", { class:"measure-ext", x1:p2.x, y1:p2.y, x2:e2.x, y2:e2.y }));
    g.appendChild(el("line", { class:"measure-line", x1:d1.x, y1:d1.y, x2:d2.x, y2:d2.y }));

    const tick = 5;
    [d1, d2].forEach(pt=>{
      g.appendChild(el("line", {
        class:"measure-tick",
        x1: pt.x - (ux-nx)*tick*0.5, y1: pt.y - (uy-ny)*tick*0.5,
        x2: pt.x + (ux-nx)*tick*0.5, y2: pt.y + (uy-ny)*tick*0.5
      }));
    });

    const mid = { x:(d1.x+d2.x)/2 + nx*12, y:(d1.y+d2.y)/2 + ny*12 };
    const text = el("text", { class:"measure-text", x:mid.x, y:mid.y });
    text.textContent = formatLength(lenM);
    g.appendChild(text);

    if(dimData){
      g.addEventListener("pointerdown", (e)=>{
        if(activeTool === "pan"){
          e.stopPropagation();
          selectedObject = { type:"dimension", id: dimData.id };
          renderSelectionRing();
          return;
        }
        if(activeTool !== "erase") return;
        e.stopPropagation();
        pushUndo();
        dimensions = dimensions.filter(x => x.id !== dimData.id);
        renderDimensions();
      });
    }
    return g;
  }

  function renderDimensions(){
    while(measureLayer.firstChild) measureLayer.removeChild(measureLayer.firstChild);
    dimensions.forEach(d => {
      const g = dimGeometryPx(d);
      const lenM = Math.hypot(d.x2-d.x1, d.y2-d.y1);
      const grp = buildDimensionGroup(g.p1, g.p2, d.offset*M, lenM, false, d);
      measureLayer.appendChild(grp);
    });

    if(dimState && dimState.p2){
      const p1 = roomMetersToWorldPx(dimState.p1.x, dimState.p1.y);
      const p2 = roomMetersToWorldPx(dimState.p2.x, dimState.p2.y);
      const lenM = Math.hypot(dimState.p2.x-dimState.p1.x, dimState.p2.y-dimState.p1.y);
      const offPx = dimState.previewOffsetPx || 24;
      const grp = buildDimensionGroup(p1, p2, offPx, lenM, false, null);
      measureLayer.appendChild(grp);
    }
  }

  function cancelMeasure(){
    dimState = null;
    renderDimensions();
  }

  function measurePointerDown(clientX, clientY){
    if(!dimState){
      const p1 = measureSnapPoint(clientX, clientY, null);
      dimState = { p1, p2:null, phase:"p2" };
      return;
    }
    if(dimState.phase === "p2"){
      const p2 = measureSnapPoint(clientX, clientY, dimState.p1);
      if(Math.hypot(p2.x-dimState.p1.x, p2.y-dimState.p1.y) < 0.05){ cancelMeasure(); return; }
      dimState.p2 = p2;
      dimState.phase = "offset";
      return;
    }
    if(dimState.phase === "offset"){
      pushUndo();
      dimensions.push({
        id: "dim-" + (dimIdCounter++),
        x1: dimState.p1.x, y1: dimState.p1.y,
        x2: dimState.p2.x, y2: dimState.p2.y,
        offset: (dimState.previewOffsetPx || 24)/M
      });
      cancelMeasure();
      return;
    }
  }

  function measurePointerMove(clientX, clientY){
    if(!dimState) return;
    if(dimState.phase === "p2"){
      const p2 = measureSnapPoint(clientX, clientY, dimState.p1);
      dimState.p2 = p2;
      renderDimensions();
      return;
    }
    if(dimState.phase === "offset"){
      const w = toWorldPoint(clientX, clientY);
      const p1 = roomMetersToWorldPx(dimState.p1.x, dimState.p1.y);
      const p2 = roomMetersToWorldPx(dimState.p2.x, dimState.p2.y);
      const dx = p2.x-p1.x, dy = p2.y-p1.y;
      const len = Math.hypot(dx,dy) || 0.0001;
      const nx = -dy/len, ny = dx/len;
      const vx = w.x-p1.x, vy = w.y-p1.y;
      dimState.previewOffsetPx = vx*nx + vy*ny;
      renderDimensions();
    }
  }


  // ---------- Arkitekt-gridlinjer (A/B/C… horisontalt, 1/2/3… vertikalt) ----------
  // ---------- Arkitekt-gridlinjer (A/B/C… horisontalt, 1/2/3… vertikalt) ----------

  function renderGridLineDims(movingId, posM){
    while(gridLineDimLayer.firstChild) gridLineDimLayer.removeChild(gridLineDimLayer.firstChild);
    if(posM == null) return;

    const g = archGridLines.find(x => x.id === movingId) || { axis: gridLineAxis, pos: posM };
    const axis = g.axis;
    const dimOffset = 28 / view.k; // avstand ut fra linja, skjermkonstant

    // Finn nærmeste parallelle gridlinje på begge sider, og veggkant
    const others = archGridLines.filter(x => x.axis === axis && x.id !== movingId)
      .map(x => x.pos).sort((a,b) => a-b);

    // Veggbounds langs denne aksen
    let boundA = -Infinity, boundB = Infinity;
    if(interiorWalls.length > 0){
      interiorWalls.forEach(w => {
        const p1 = roomMetersToWorldPx(w.x1,w.y1), p2 = roomMetersToWorldPx(w.x2,w.y2);
        const half = w.t*M/2;
        if(axis === "y"){
          boundA = Math.max(boundA, (Math.min(p1.x,p2.x)-half - originX)/M);
          boundB = Math.min(boundB, (Math.max(p1.x,p2.x)+half - originX)/M);
        } else {
          boundA = Math.max(boundA, (Math.min(p1.y,p2.y)-half - originY)/M);
          boundB = Math.min(boundB, (Math.max(p1.y,p2.y)+half - originY)/M);
        }
      });
      // Ytre kanter
      if(axis === "y"){
        boundA = (originX - originX)/M; // 0
        boundB = outerW/M;
      } else {
        boundA = (originY - originY)/M;
        boundB = outerH/M;
      }
    }

    // Samle alle referanser: veggkanter + andre gridlinjer
    const refs = [...new Set([boundA, boundB, ...others])].sort((a,b)=>a-b);

    // Finn nærmeste ref på hver side
    const left  = refs.filter(r => r < posM - 0.001);
    const right = refs.filter(r => r > posM + 0.001);
    const refA = left.length  ? left[left.length-1] : null;
    const refB = right.length ? right[0] : null;

    const pairs = [];
    if(refA != null) pairs.push({ from: refA, to: posM });
    if(refB != null) pairs.push({ from: posM, to: refB });

    pairs.forEach(pair => {
      const lenM = pair.to - pair.from;
      let p1px, p2px;
      if(axis === "y"){
        const midY = originY + outerH/2;  // midten langs Y-aksen av standardrommet
        p1px = { x: originX + pair.from*M, y: midY };
        p2px = { x: originX + pair.to*M,   y: midY };
      } else {
        const midX = originX + outerW/2;
        p1px = { x: midX, y: originY + pair.from*M };
        p2px = { x: midX, y: originY + pair.to*M };
      }
      const g2 = buildDimensionGroup(p1px, p2px, dimOffset, lenM, false, null);
      g2.style.opacity = "0.8";
      gridLineDimLayer.appendChild(g2);
    });
  }

  function relabelGridLines(){
    // Sorter og gi nye navn basert på posisjon langs aksen
    ["y", "x"].forEach(axis => {
      const lines = archGridLines
        .filter(g => g.axis === axis)
        .sort((a, b) => a.pos - b.pos);
      lines.forEach((g, i) => {
        g.label = axis === "y"
          ? String(i + 1)
          : (ALPHA[i] || String(i + 1));
      });
    });
  }

  // Beregn boble-posisjon i world-px — fast avstand utenfor veggenes bounding box
  function gridLineBubblePos(g){
    let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
    interiorWalls.forEach(w => {
      const p1 = roomMetersToWorldPx(w.x1,w.y1), p2 = roomMetersToWorldPx(w.x2,w.y2);
      const half = w.t*M/2;
      minX=Math.min(minX,p1.x-half,p2.x-half); maxX=Math.max(maxX,p1.x+half,p2.x+half);
      minY=Math.min(minY,p1.y-half,p2.y-half); maxY=Math.max(maxY,p1.y+half,p2.y+half);
    });
    if(!isFinite(minX)){ minX=originX; maxX=originX+outerW; minY=originY; maxY=originY+outerH; }
    const margin = 48 / view.k;
    const jog0 = (g.jog0 || 0) / view.k;
    const jog1 = (g.jog1 || 0) / view.k;

    if(g.axis === "y"){
      // Vertikal linje — boblen forskyves horisontalt (X), beholder sin Y
      const px = originX + g.pos*M;
      return [
        { x: px + jog0, y: minY - margin,  // boble
          kinkX: px, jogged: !!g.jog0 },   // knekk-punkt på linjens X, bobles Y
        { x: px + jog1, y: maxY + margin,
          kinkX: px, jogged: !!g.jog1 },
      ];
    } else {
      // Horisontal linje — boblen forskyves vertikalt (Y), beholder sin X
      const py = originY + g.pos*M;
      return [
        { x: minX - margin, y: py + jog0,
          kinkY: py, jogged: !!g.jog0 },
        { x: maxX + margin, y: py + jog1,
          kinkY: py, jogged: !!g.jog1 },
      ];
    }
  }

  function renderArchGridLines(){
    while(gridLineLayer.firstChild) gridLineLayer.removeChild(gridLineLayer.firstChild);
    const r = 14 / view.k;

    archGridLines.forEach(g => {
      const isSelected = g.id === selectedGridLineId;
      const isLocked = !!g.locked;
      const grp = el("g");

      const bpos = gridLineBubblePos(g);

      // Hovdlinje — alltid rett mellom de to boble-ankerpunktene (linjens faktiske posisjon)
      let ax1, ay1, ax2, ay2;
      if(g.axis === "y"){
        const px = originX + g.pos*M;
        ax1 = px; ay1 = bpos[0].y;
        ax2 = px; ay2 = bpos[1].y;
      } else {
        const py = originY + g.pos*M;
        ax1 = bpos[0].x; ay1 = py;
        ax2 = bpos[1].x; ay2 = py;
      }
      const lineEl = el("line", { x1:ax1, y1:ay1, x2:ax2, y2:ay2,
        class:"gl-line"+(isSelected?" gl-selected":"")+(isLocked?" gl-locked":"") });
      lineEl.style.strokeWidth = (1.2/view.k);
      grp.appendChild(lineEl);

      // Klikk-flate langs hovdlinjen
      // Bred, lettgripelig gripeflate kun når Gridlines-verktøyet faktisk er aktivt (til dra-i-linja).
      // Ellers smal, så den ikke overskygger vegger som ligger tett inntil gridlinja (f.eks. i select-modus).
      const hitWidth = (activeTool === "gridline" ? 28 : 6) / view.k;
      const hitLine = el("line", { x1:ax1, y1:ay1, x2:ax2, y2:ay2,
        stroke:"transparent", "stroke-width": hitWidth });
      hitLine.style.cursor = isLocked ? "not-allowed" : "grab";
      attachGridLineBodyHandler(hitLine, g);
      grp.appendChild(hitLine);

      // Bobler i begge ender + kne-hals + lås-ikon
      bpos.forEach((bp, bIdx) => {
        const bubClass = "gl-bubble"+(isSelected?" gl-selected":"")+(isLocked?" gl-locked":"");
        const bgrp = el("g", { class:bubClass });

        // Kne-hals: kort L fra linjens slutt til boble
        if(bp.jogged){
          let neckD;
          if(g.axis === "y"){
            // Vertikal linje — hals: rett ned til bobles Y, så sidelengs til boble
            neckD = `M${bp.kinkX},${bp.y} L${bp.x},${bp.y}`;
          } else {
            // Horisontal linje — hals: rett bort til bobles X, så ned/opp til boble
            neckD = `M${bp.x},${bp.kinkY} L${bp.x},${bp.y}`;
          }
          const neckEl = el("path", { d:neckD, fill:"none",
            class:"gl-line"+(isLocked?" gl-locked":"") });
          neckEl.style.strokeWidth = (1.2/view.k);
          neckEl.style.strokeDasharray = "none";
          grp.appendChild(neckEl);
        }

        const circ = el("circle", { cx:bp.x, cy:bp.y, r });
        circ.style.strokeWidth = (1.8/view.k);
        bgrp.appendChild(circ);
        const txt = el("text", { x:bp.x, y:bp.y, "text-anchor":"middle", "dominant-baseline":"middle" });
        txt.textContent = g.label;
        txt.style.fontSize = (13/view.k)+"px";
        txt.style.fontFamily = "var(--mono)";
        txt.style.fontWeight = "600";
        txt.style.pointerEvents = "none";
        bgrp.appendChild(txt);

        // Lås-ikon ved første boble
        if(bIdx === 0){
          const lkSize = 10/view.k;
          const lkX = bp.x + r*0.85, lkY = bp.y - r*0.85;
          const lkGrp = el("g", { class:"gl-lock"+(isLocked?" locked":"") });
          const lkRect = el("rect", { x:lkX-lkSize/2, y:lkY-lkSize/2, width:lkSize, height:lkSize, rx:lkSize*0.25 });
          lkRect.style.strokeWidth = (1.2/view.k);
          lkGrp.appendChild(lkRect);
          const lkTxt = el("text", { x:lkX, y:lkY, "text-anchor":"middle", "dominant-baseline":"middle" });
          lkTxt.textContent = isLocked ? "🔒" : "🔓";
          lkTxt.style.fontSize = (9/view.k)+"px";
          lkTxt.style.pointerEvents = "none";
          lkGrp.appendChild(lkTxt);
          lkGrp.addEventListener("pointerdown", (e)=>{
            e.stopPropagation();
            pushUndo();
            g.locked = !g.locked;
            renderArchGridLines();
          });
          bgrp.appendChild(lkGrp);
        }

        // Dra boblen for å lage/fjerne kne (jog)
        if(!isLocked && activeTool === "gridline"){
          bgrp.style.cursor = "ew-resize";
          bgrp.addEventListener("pointerdown", (e)=>{
            e.stopPropagation();
            pushUndo();
            stage.setPointerCapture(e.pointerId);
            const jogKey  = bIdx === 0 ? "jog0" : "jog1";
            const otherKey = bIdx === 0 ? "jog1" : "jog0";
            const onMove = (ev)=>{
              const w2 = toWorldPoint(ev.clientX, ev.clientY);
              const raw = g.axis === "y"
                ? (w2.x - (originX + g.pos*M)) * view.k
                : (w2.y - (originY + g.pos*M)) * view.k;
              const val = Math.abs(raw) < 8 ? 0 : raw;
              g[jogKey] = val;
              // Begge følger med som standard; hold Alt for å flytte kun én
              if(!ev.altKey) g[otherKey] = val;
              renderArchGridLines();
            };
            const onUp = (ev)=>{
              stage.releasePointerCapture(ev.pointerId);
              stage.removeEventListener("pointermove", onMove);
              stage.removeEventListener("pointerup", onUp);
            };
            stage.addEventListener("pointermove", onMove);
            stage.addEventListener("pointerup", onUp);
          });
        }

        attachGridLineBubbleHandler(bgrp, g);
        grp.appendChild(bgrp);
      });

      gridLineLayer.appendChild(grp);
    });
  }

  function attachGridLineBodyHandler(hitEl, g){
    hitEl.addEventListener("pointerdown", (e)=>{
      if(activeTool === "pan"){
        e.stopPropagation();
        selectedObject = { type:"gridline", id: g.id };
        renderSelectionRing();
        return;
      }
      if(activeTool !== "gridline" && activeTool !== "erase") return;
      e.stopPropagation();
      if(activeTool === "erase"){
        if(g.locked){ showSpaceHint(e.clientX, e.clientY, "GRID LINE IS LOCKED"); return; }
        pushUndo();
        archGridLines = archGridLines.filter(x => x.id !== g.id);
        if(selectedGridLineId === g.id) selectedGridLineId = null;
        relabelGridLines();
        renderArchGridLines();
        return;
      }
      if(g.locked){ selectedGridLineId = g.id; renderArchGridLines(); return; }
      pushUndo();
      selectedGridLineId = g.id;
      renderArchGridLines();
      stage.setPointerCapture(e.pointerId);
      stage.style.cursor = "grabbing";

      const onMove = (ev)=>{
        const w = toWorldPoint(ev.clientX, ev.clientY);
        const m = worldPxToRoomMeters(w.x, w.y);
        const gl = archGridLines.find(x => x.id === g.id);
        if(!gl) return;
        gl.pos = snap5(gl.axis === "y" ? m.x : m.y);
        relabelGridLines();
        renderArchGridLines();
        renderGridLineDims(g.id, gl.pos);
      };
      const onUp = (ev)=>{
        stage.style.cursor = "";
        stage.releasePointerCapture(ev.pointerId);
        stage.removeEventListener("pointermove", onMove);
        stage.removeEventListener("pointerup", onUp);
        renderGridLineDims(null, null);
      };
      stage.addEventListener("pointermove", onMove);
      stage.addEventListener("pointerup", onUp);
    });
  }

  function attachGridLineBubbleHandler(bgrp, g){
    bgrp.addEventListener("pointerdown", (e)=>{
      e.stopPropagation();
      if(activeTool === "pan"){
        selectedObject = { type:"gridline", id: g.id };
        renderSelectionRing();
        return;
      }
      if(activeTool === "erase"){
        if(g.locked){ showSpaceHint(e.clientX, e.clientY, "GRID LINE IS LOCKED"); return; }
        pushUndo();
        archGridLines = archGridLines.filter(x => x.id !== g.id);
        if(selectedGridLineId === g.id) selectedGridLineId = null;
        relabelGridLines();
        renderArchGridLines();
        return;
      }
      if(activeTool === "gridline"){
        selectedGridLineId = selectedGridLineId === g.id ? null : g.id;
        renderArchGridLines();
      }
    });
  }

  // ---------- Gridlinje-retningsvalg ----------
  let gridLineAxis = "y"; // "y" = vertikal (tall), "x" = horisontal (bokstav)
  const glAxisVertical = document.getElementById("glAxisVertical");
  const glAxisHorizontal = document.getElementById("glAxisHorizontal");

  function setGridLineAxis(axis){
    gridLineAxis = axis;
    glAxisVertical.classList.toggle("active", axis === "y");
    glAxisHorizontal.classList.toggle("active", axis === "x");
  }
  glAxisVertical.addEventListener("click", ()=> setGridLineAxis("y"));
  glAxisHorizontal.addEventListener("click", ()=> setGridLineAxis("x"));

  function tryCreateGridLine(clientX, clientY){
    const w = toWorldPoint(clientX, clientY);
    const m = worldPxToRoomMeters(w.x, w.y);
    const axis = gridLineAxis;
    pushUndo();
    archGridLines.push({
      id: "gl-" + (archGridIdCounter++),
      axis,
      pos: snap5(axis === "y" ? m.x : m.y),
      label: "?"  // temporary, relabelGridLines will assign correct label
    });
    relabelGridLines();
    renderArchGridLines();
  }

  let undoStack = [];
  let redoStack = [];
  const UNDO_LIMIT = 50;

  function snapshotState(){
    return {
      interiorWalls: JSON.parse(JSON.stringify(interiorWalls)),
      openings: JSON.parse(JSON.stringify(openings)),
      spaces: JSON.parse(JSON.stringify(spaces)),
      dimensions: JSON.parse(JSON.stringify(dimensions)),
      archGridLines: JSON.parse(JSON.stringify(archGridLines)),
    };
  }

  function pushUndo(){
    undoStack.push(snapshotState());
    if(undoStack.length > UNDO_LIMIT) undoStack.shift();
    redoStack = []; // a new action invalidates the redo history
  }

  function restoreSnapshot(s){
    interiorWalls = s.interiorWalls;
    openings = s.openings;
    spaces = s.spaces;
    dimensions = s.dimensions || [];
    archGridLines = s.archGridLines || [];
    selectedWallId = null;
    hoveredWallId = null;
    selectedOpeningId = null;
    if(typeof selectedObject !== "undefined") selectedObject = null;
    closeNameInput(false);
    renderInteriorWalls();
    renderDimensions();
    renderOpenings();
    renderArchGridLines();
    if(typeof renderSelectionRing === "function") renderSelectionRing();
    recomputeSpaces();
  }

  function undo(){
    if(undoStack.length === 0) return;
    redoStack.push(snapshotState());
    restoreSnapshot(undoStack.pop());
  }

  function redo(){
    if(redoStack.length === 0) return;
    undoStack.push(snapshotState());
    restoreSnapshot(redoStack.pop());
  }

  window.addEventListener("keydown", (e)=>{
    const tag = document.activeElement && document.activeElement.tagName;
    if(tag === "INPUT") return; // la nettleserens egen tekst-angre virke i inputfelt
    if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "z"){
      e.preventDefault();
      if(e.shiftKey) redo(); else undo();
    }
    if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "y"){
      e.preventDefault();
      redo();
    }
  });

  document.getElementById("btnUndo").addEventListener("click", ()=> undo());
  document.getElementById("btnRedo").addEventListener("click", ()=> redo());

  // ---------- Lagre / åpne (JSON) ----------
  function exportState(){
    const data = {
      version: 1,
      interiorWalls, openings, spaces, dimensions, archGridLines,
      idCounter, openingIdCounter, spaceIdCounter, dimIdCounter, archGridIdCounter
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const stamp = new Date().toISOString().slice(0,10);
    a.download = "drawplan_" + stamp + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importStateFromFile(file){
    const reader = new FileReader();
    reader.onload = (e)=>{
      let data;
      try{ data = JSON.parse(e.target.result); }
      catch(err){ showSpaceHint(vb.w/2, vb.h/2, "COULD NOT READ FILE"); return; }
      pushUndo();
      interiorWalls = Array.isArray(data.interiorWalls) ? data.interiorWalls : [];
      openings = Array.isArray(data.openings) ? data.openings : [];
      spaces = Array.isArray(data.spaces) ? data.spaces : [];
      dimensions = Array.isArray(data.dimensions) ? data.dimensions : [];
      archGridLines = Array.isArray(data.archGridLines) ? data.archGridLines : [];
      idCounter = data.idCounter || (interiorWalls.length + 1);
      openingIdCounter = data.openingIdCounter || (openings.length + 1);
      spaceIdCounter = data.spaceIdCounter || (spaces.length + 1);
      dimIdCounter = data.dimIdCounter || (dimensions.length + 1);
      archGridIdCounter = data.archGridIdCounter || (archGridLines.length + 1);
      selectedWallId = null;
      hoveredWallId = null;
      renderInteriorWalls();
      renderDimensions();
      renderArchGridLines();
      recomputeSpaces();
    };
    reader.readAsText(file);
  }
