<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drawplan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0B0D;
    --bg-vignette: rgba(0,0,0,0.55);
    --surface:#16181C;
    --surface-border: rgba(232,236,240,0.10);
    --line: rgba(226,230,235,0.40);
    --line-strong: rgba(232,236,240,0.80);
    --wall-drafting:#25272C;
    --wall-polish-a:#3A3E46;
    --wall-polish-b:#1A1C20;
    --floor-polish-a: rgba(242,200,121,0.10);
    --floor-polish-b: rgba(10,11,13,0);
    --accent:#5EA8A0;
    --accent-soft: rgba(94,168,160,0.16);
    --sun:#F2C879;
    --danger:#E5484D;
    --danger-soft: rgba(229,72,77,0.16);
    --text: #E7EAEE;
    --text-dim: rgba(226,230,235,0.52);
    --text-faint: rgba(226,230,235,0.30);
    --overlay-1: rgba(255,255,255,0.03);
    --overlay-2: rgba(255,255,255,0.045);
    --overlay-3: rgba(255,255,255,0.06);
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sans: 'Space Grotesk', -apple-system, sans-serif;
  }

  body[data-theme="light"]{
    --bg:#F0F1F3;
    --bg-vignette: rgba(20,22,26,0.07);
    --surface:#FFFFFF;
    --surface-border: rgba(20,22,26,0.10);
    --line: rgba(20,22,26,0.38);
    --line-strong: rgba(20,22,26,0.78);
    --wall-drafting:#D7DADE;
    --wall-polish-a:#EBEDF0;
    --wall-polish-b:#C6CBD1;
    --floor-polish-a: rgba(200,140,40,0.08);
    --floor-polish-b: rgba(240,241,243,0);
    --accent:#3D8A82;
    --accent-soft: rgba(61,138,130,0.14);
    --sun:#C8973F;
    --danger:#C93A3F;
    --danger-soft: rgba(201,58,63,0.12);
    --text:#1B1D21;
    --text-dim: rgba(27,29,33,0.58);
    --text-faint: rgba(27,29,33,0.36);
    --overlay-1: rgba(20,22,26,0.035);
    --overlay-2: rgba(20,22,26,0.05);
    --overlay-3: rgba(20,22,26,0.07);
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  .app{
    position:relative;
    width:100vw;
    height:100vh;
  }

  .vignette{
    position:absolute; inset:0;
    pointer-events:none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 45%, var(--bg-vignette) 100%);
    z-index:5;
  }

  /* ---------- HUD ---------- */
  .hud{
    position:absolute; top:22px; left:26px; z-index:10;
    pointer-events:none;
  }
  .hud-title{
    font-size:14px; letter-spacing:0.08em;
    color:var(--text);
    font-weight:600;
  }
  .hud-title .proj{ color:var(--accent); }
  .hud-title .sep{ color:var(--text-faint); margin:0 6px; font-weight:400; }
  .hud-title .file{ color:var(--text-dim); font-weight:500; }
  .hud-sub{
    margin-top:6px;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.02em;
    color:var(--text-faint);
  }

  /* ---------- Compass ---------- */
  .compass{
    position:absolute; top:24px; right:28px; z-index:10;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    font-family:var(--mono); font-size:10px; color:var(--text-dim);
    pointer-events:none;
    user-select:none;
  }
  .compass svg{ width:22px; height:30px; }

  /* ---------- Scale bar ---------- */
  .scalebar{
    position:absolute; bottom:28px; left:26px; z-index:10;
    display:flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:10px; color:var(--text-dim);
    pointer-events:none;
  }
  .scalebar svg{ display:block; }

  /* ---------- Stage ---------- */
  #stage{
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
    cursor:grab;
    touch-action:none;
  }
  #stage{ cursor:default; }
  #stage.grabbing{ cursor:grabbing; }
  #stage.tool-draw{ cursor:crosshair; }

  .selection-ring{ fill:none; stroke:var(--sun); stroke-width:2; vector-effect:non-scaling-stroke; stroke-dasharray:4 3; pointer-events:none; opacity:0.9; }
  .selected-opening .opening-cut{ stroke:var(--sun); stroke-width:2; vector-effect:non-scaling-stroke; }
  #stage.tool-erase{ cursor:default; }
  #stage.tool-edit{ cursor:default; }
  #stage.tool-space{ cursor:crosshair; }
  #stage.tool-opening{ cursor:crosshair; }
  #stage.tool-measure{ cursor:crosshair; }

  #world{
    opacity:0;
    transform-origin:0 0;
  }
  #world.ready{
    animation: worldIn .7s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes worldIn{
    from{ opacity:0; }
    to{ opacity:1; }
  }

  .wall-preview{ opacity:0.55; pointer-events:none; }

  #wallsPolish{ opacity:0; transition:opacity .65s ease; }
  #wallsDrafting{ opacity:1; transition:opacity .65s ease; }

  body[data-mode="polish"] #wallsDrafting{ opacity:0; }
  body[data-mode="polish"] #wallsPolish{ opacity:1; }

  .edit-handle{
    fill:var(--accent); stroke:var(--bg); stroke-width:2;
    vector-effect:non-scaling-stroke; cursor:move;
  }
  .edit-handle:hover{ fill:var(--text); }

  .snap-marker{ vector-effect:non-scaling-stroke; pointer-events:none; stroke-width:2.4; }
  .snap-marker-vertex{ fill:var(--accent); fill-opacity:0.22; stroke:var(--accent); }
  .snap-marker-edge{ fill:#E0A83D; fill-opacity:0.22; stroke:#E0A83D; }
  .snap-marker-face{ fill:#7C93E6; fill-opacity:0.22; stroke:#7C93E6; }

  .opening-group{ cursor:pointer; }
  .opening-cut{ fill:var(--bg); transition:fill .15s ease; }
  .opening-group:hover .opening-cut{ fill:rgba(94,168,160,0.10); }
  .opening-group.selected .opening-cut{ stroke:var(--accent); stroke-width:1.6; vector-effect:non-scaling-stroke; }
  .opening-cut-preview{ fill:var(--accent); fill-opacity:0.16; stroke:var(--accent); stroke-width:1; stroke-dasharray:3 3; vector-effect:non-scaling-stroke; pointer-events:none; }
  .opening-jamb{ stroke:var(--line); stroke-width:1.1; vector-effect:non-scaling-stroke; }
  .opening-leaf{ stroke:var(--line); stroke-width:1.1; vector-effect:non-scaling-stroke; }
  .opening-arc{ stroke:var(--text-faint); stroke-width:0.8; vector-effect:non-scaling-stroke; fill:none; }
  .opening-pane{ stroke:var(--line); stroke-width:1; vector-effect:non-scaling-stroke; }

  .tracking-line{ stroke:rgba(255,210,80,0.55); stroke-width:0.8; vector-effect:non-scaling-stroke; stroke-dasharray:4 4; pointer-events:none; }
  .tracking-dot{ fill:rgba(255,210,80,0.7); pointer-events:none; }

  .draw-label{
    font-family:var(--mono); font-size:11px; fill:var(--accent);
    pointer-events:none;
  }

  .space-name{ font-family:var(--sans); font-size:13px; font-weight:500; fill:var(--text); text-anchor:middle; cursor:pointer; }
  .space-area{ font-family:var(--mono); font-size:10.5px; letter-spacing:0.02em; fill:var(--text-dim); text-anchor:middle; cursor:pointer; }
  .space-group.invalid .space-area{ fill:var(--danger); }
  .space-delete{ cursor:pointer; }
  .space-delete circle{ fill:var(--overlay-2); stroke:var(--surface-border); stroke-width:0.6; vector-effect:non-scaling-stroke; }
  .space-delete text{ font-family:var(--mono); font-size:9px; fill:var(--text-faint); text-anchor:middle; dominant-baseline:middle; pointer-events:none; }
  .space-delete:hover circle{ fill:var(--danger-soft); }
  .space-delete:hover text{ fill:var(--danger); }
  .space-hint{
    font-family:var(--mono); font-size:11px; fill:var(--text-dim);
    text-anchor:middle; opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }

  .space-name-input{
    position:absolute; z-index:20; display:none;
    transform:translate(-50%,-50%);
    background:var(--surface);
    border:1px solid var(--accent);
    border-radius:8px;
    color:var(--text);
    font-family:var(--sans); font-size:13px;
    padding:6px 10px;
    width:140px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
  }
  .space-name-input:focus{ outline:none; }

  .floor-type-overlay{
    position:absolute; z-index:19; display:none;
    transform:translate(-50%, calc(-50% + 36px));
    background:var(--surface);
    border:1px solid var(--surface-border);
    border-radius:8px;
    padding:3px;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
    display:none; align-items:center; gap:4px;
  }
  .floor-type-select{
    appearance:none; -webkit-appearance:none;
    background:transparent; border:none; outline:none;
    color:var(--text-dim); font-family:var(--sans); font-size:12px;
    padding:4px 8px; cursor:pointer; width:120px; text-align:center;
  }
  .floor-type-select option{ background:var(--surface); color:var(--text); }
  #btnConfirmSpace{
    appearance:none; border:none;
    background:var(--accent); color:var(--bg);
    border-radius:6px; padding:4px 8px;
    font-size:12px; cursor:pointer; font-weight:700;
  }
  #btnConfirmSpace:hover{ opacity:0.85; }

  /* Gulvfarger — brukes som fill på rombakgrunn */
  .space-fill-parkett{ fill:rgba(185,140,90,0.13); }
  .space-fill-laminat{ fill:rgba(200,165,110,0.11); }
  .space-fill-fliser{ fill:rgba(100,160,190,0.13); }
  .space-fill-betong{ fill:rgba(140,140,140,0.12); }
  .space-fill-vinyl{ fill:rgba(160,200,160,0.11); }
  .space-fill-teppe{ fill:rgba(180,120,160,0.13); }
  .space-fill-marmor{ fill:rgba(220,210,200,0.15); }

  .space-floor-type{ font-family:var(--mono); font-size:9px; fill:var(--text-faint); text-anchor:middle; letter-spacing:0.05em; }

  .draw-length-overlay{
    position:absolute; z-index:20; display:none;
    transform:translate(-50%,-50%);
    align-items:center; gap:5px;
    background:var(--surface);
    border:1px solid var(--accent);
    border-radius:8px;
    padding:4px 8px;
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
  }
  .draw-length-overlay input{
    width:56px;
    background:transparent; border:none; outline:none;
    color:var(--accent);
    font-family:var(--mono); font-size:12.5px;
    text-align:right;
  }
  .draw-length-overlay span{
    font-family:var(--mono); font-size:11px; color:var(--text-faint);
  }

  .opening-edit-overlay{
    position:absolute; z-index:20; display:none;
    transform:translate(-50%,-50%);
    align-items:center; gap:2px;
    background:var(--surface);
    border:1px solid var(--accent);
    border-radius:999px;
    padding:4px;
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
  }
  .opening-edit-overlay .icon-btn{ width:28px; height:28px; font-size:14px; }
  .opening-edit-overlay .divider{ height:16px; }
  .opening-edit-overlay input[type="number"]{
    width:52px; background:rgba(255,255,255,0.04);
    border:1px solid var(--surface-border); border-radius:6px;
    color:var(--text); font-family:var(--mono); font-size:11.5px;
    padding:4px 5px; text-align:right;
  }
  .opening-edit-overlay input[type="number"]:focus{ outline:none; border-color:var(--accent); }

  .wall-info-overlay{
    position:absolute; z-index:20; display:none;
    transform:translate(-50%,-100%);
    flex-direction:column; gap:3px;
    background:var(--surface);
    border:1px solid var(--accent);
    border-radius:10px;
    padding:8px 10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
    font-family:var(--mono); font-size:11px;
    pointer-events:none;
    white-space:nowrap;
  }
  .wall-info-overlay .wall-info-row{ display:flex; justify-content:space-between; gap:14px; }
  .wall-info-overlay .wall-info-label{ color:var(--text-faint); }
  .wall-info-overlay .wall-info-value{ color:var(--text); }
  #btnDeleteOpening:hover{ background:var(--danger-soft); color:var(--danger); }

  .measure-ext{ stroke:var(--text-faint); stroke-width:0.7; vector-effect:non-scaling-stroke; }

  .gl-line{ stroke:var(--accent); stroke-width:1; vector-effect:non-scaling-stroke; stroke-dasharray:8 4; opacity:0.8; }
  .gl-line.gl-selected{ stroke:var(--sun); stroke-dasharray:none; opacity:1; }
  .gl-line.gl-locked{ stroke-dasharray:none; opacity:0.45; }
  .gl-bubble circle{ fill:var(--surface); stroke:var(--accent); }
  .gl-bubble text{ fill:var(--accent); }
  .gl-bubble.gl-selected circle{ fill:var(--surface); stroke:var(--sun); }
  .gl-bubble.gl-selected text{ fill:var(--sun); }
  .gl-bubble.gl-locked circle{ stroke:var(--text-faint); }
  .gl-bubble.gl-locked text{ fill:var(--text-faint); }
  .gl-bubble:hover circle{ fill:var(--accent-soft); }
  .gl-lock{ cursor:pointer; }
  .gl-lock rect{ fill:var(--surface); stroke:var(--text-faint); vector-effect:non-scaling-stroke; }
  .gl-lock text{ fill:var(--text-faint); }
  .gl-lock.locked rect{ fill:var(--accent-soft); stroke:var(--accent); }
  .gl-lock.locked text{ fill:var(--accent); }
  .gl-kink{ fill:none; stroke:var(--accent); vector-effect:non-scaling-stroke; }
  #stage.tool-gridline{ cursor:crosshair; }
  .measure-line{ stroke:var(--text-dim); stroke-width:0.9; vector-effect:non-scaling-stroke; }
  .measure-tick{ stroke:var(--text-dim); stroke-width:1.1; vector-effect:non-scaling-stroke; }
  .measure-text{ font-family:var(--mono); font-size:11px; fill:var(--text-dim); text-anchor:middle; }
  .measure-group{ cursor:default; }
  #stage.tool-erase .measure-group{ cursor:pointer; }
  #stage.tool-erase .measure-group:hover .measure-line{ stroke:var(--danger); }
  #stage.tool-erase .measure-group:hover .measure-text{ fill:var(--danger); }

  .grid-line-fine  { stroke:rgba(128,128,128,0.10); vector-effect:non-scaling-stroke; stroke-width:1; }
  .grid-line-coarse{ stroke:rgba(128,128,128,0.22); vector-effect:non-scaling-stroke; stroke-width:1; }
  .grid-axis-x    { stroke:rgba(100,130,255,0.45); vector-effect:non-scaling-stroke; stroke-width:1.5; }
  .grid-axis-y    { stroke:rgba(255,100,100,0.45); vector-effect:non-scaling-stroke; stroke-width:1.5; }
  body[data-theme="light"] .grid-line-fine  { stroke:rgba(80,80,80,0.09); }
  body[data-theme="light"] .grid-line-coarse{ stroke:rgba(80,80,80,0.20); }
  body[data-theme="light"] .grid-axis-x    { stroke:rgba(60,80,220,0.38); }
  body[data-theme="light"] .grid-axis-y    { stroke:rgba(210,50,50,0.38); }

  /* ---------- Romskjema ---------- */
  .room-schedule{
    position:absolute; top:70px; right:26px; bottom:110px; z-index:10;
    width:220px;
    background:var(--surface);
    border:1px solid var(--surface-border);
    border-radius:14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.2);
    backdrop-filter: blur(8px);
    display:flex; flex-direction:column;
    overflow:hidden;
    opacity:0; pointer-events:none;
    transition:opacity .3s ease;
  }
  .room-schedule.visible{ opacity:1; pointer-events:auto; }

  .room-schedule-header{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 14px 10px;
    font-family:var(--mono); font-size:10.5px; letter-spacing:0.08em;
    color:var(--text-faint);
    border-bottom:1px solid var(--surface-border);
    flex-shrink:0;
  }
  .room-schedule-count{
    background:var(--overlay-3); border-radius:999px;
    padding:1px 7px; color:var(--text-dim);
  }

  .room-schedule-list{
    overflow-y:auto;
    flex:1;
  }
  .room-schedule-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 14px;
    cursor:pointer;
    border-bottom:1px solid var(--overlay-2);
    transition:background .15s ease;
  }
  .room-schedule-row:last-child{ border-bottom:none; }
  .room-schedule-row:hover{ background:var(--overlay-2); }
  .room-schedule-row-name{
    font-family:var(--sans); font-size:12.5px; color:var(--text);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    flex:1; margin-right:8px;
  }
  .room-schedule-row-area{
    font-family:var(--mono); font-size:11.5px; color:var(--text-dim);
    white-space:nowrap;
  }
  .room-schedule-row-area.invalid{ color:var(--danger); }
  .room-schedule-row-del{
    width:18px; height:18px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    color:var(--text-faint); font-family:var(--mono); font-size:11px;
    margin-left:6px;
    opacity:0; transition:opacity .15s ease, background .15s ease, color .15s ease;
  }
  .room-schedule-row:hover .room-schedule-row-del{ opacity:1; }
  .room-schedule-row-del:hover{ background:var(--danger-soft); color:var(--danger); }

  .room-schedule-total{
    display:flex; justify-content:space-between; align-items:center;
    padding:11px 14px;
    border-top:1px solid var(--surface-border);
    font-family:var(--mono); font-size:11.5px;
    color:var(--text);
    background:var(--overlay-1);
    flex-shrink:0;
  }
  .room-schedule-total span:first-child{ color:var(--text-faint); letter-spacing:0.06em; }

  @media (max-width: 720px){
    .room-schedule{ display:none; }
  }

  /* ---------- Toolbars ---------- */
  .toolbar{
    position:absolute; left:50%; transform:translateX(-50%);
    z-index:10;
    display:flex; align-items:center; gap:2px;
    background:var(--surface);
    border:1px solid var(--surface-border);
    border-radius:999px;
    padding:5px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.2);
    backdrop-filter: blur(8px);
  }
  .toolbar.primary{ bottom:26px; }
  .toolbar.tools{ bottom:78px; }

  .mode-group{
    display:flex; background:var(--overlay-1); border-radius:999px; padding:3px;
  }
  .mode-btn{
    appearance:none; border:none; background:transparent;
    color:var(--text-dim); font-family:var(--sans); font-size:12.5px; font-weight:500;
    padding:7px 16px; border-radius:999px; cursor:pointer;
    transition: background .3s ease, color .3s ease;
    white-space:nowrap;
  }
  .mode-btn.active{
    background:var(--accent-soft); color:var(--text);
  }
  .mode-btn.active.danger{ background:var(--danger-soft); }
  .mode-btn:hover:not(.active){ color:var(--text); }

  .divider{ width:1px; height:20px; background:var(--surface-border); margin:0 6px; }

  .icon-btn{
    appearance:none; border:none; background:transparent;
    color:var(--text-dim); width:32px; height:32px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-family:var(--mono); font-size:15px;
    transition: background .2s ease, color .2s ease;
  }
  .icon-btn:hover{ background:var(--overlay-3); color:var(--text); }
  .icon-btn.active{ background:var(--accent-soft); color:var(--accent); }

  .unit-select{
    appearance:none; -webkit-appearance:none;
    background:var(--overlay-1);
    border:1px solid var(--surface-border);
    border-radius:8px;
    color:var(--text-dim);
    font-family:var(--mono); font-size:11px; letter-spacing:0.03em;
    padding:6px 9px;
    cursor:pointer;
  }
  .unit-select:hover{ color:var(--text); background:var(--overlay-2); }
  .unit-select:focus{ outline:none; border-color:var(--accent); }
  .unit-select option{ background:var(--surface); color:var(--text); }

  .icon-btn.active:hover{ background:var(--accent-soft); }

  .mode-group.small{ padding:2px; }
  .mode-group.small .mode-btn{ padding:5px 11px; font-size:11.5px; }
  #chainToggle{ padding:6px 12px; font-size:11.5px; }

  .thickness-control, .opening-control{
    display:none; align-items:center; gap:9px;
    padding:0 12px 0 4px;
  }
  .thickness-control input[type="number"], .opening-control input[type="number"]{
    width:56px;
    background:var(--overlay-2);
    border:1px solid var(--surface-border);
    border-radius:8px;
    color:var(--text);
    font-family:var(--mono); font-size:12px;
    padding:6px 6px;
    text-align:right;
  }
  .thickness-control input[type="number"]:focus, .opening-control input[type="number"]:focus{
    outline:none;
    border-color:var(--accent);
    background:var(--overlay-3);
  }
  .thickness-control .thickness-unit{
    font-family:var(--mono); font-size:11px; color:var(--text-faint);
  }

  button:focus-visible, .icon-btn:focus-visible, .mode-btn:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    #world.ready{ animation:none; opacity:1; }
    #wallsPolish, #wallsDrafting, .mode-btn{ transition:none; }
  }

  @media (max-width: 560px){
    .hud-sub{ display:none; }
    .compass{ display:none; }
    .toolbar.tools{ bottom:74px; }
  }
</style>
